      <input type="hidden" id="newcat_type" value="expense" />
      <label class="checkbox-field" id="newcat_essential_wrap"><input type="checkbox" id="newcat_essential" checked /> Būtina išlaida (biudžetas nesikeičia, jei pajamos svyruoja)</label>
      <div id="newcat_goal_wrap" style="display:none;">
        <div class="toggle-row" style="margin-bottom:8px;">
          <button type="button" class="toggle-btn active blue" id="newcat_amount" onclick="setNewCatGoalType('amount')">€ suma</button>
          <button type="button" class="toggle-btn" id="newcat_percent" onclick="setNewCatGoalType('percent')">% nuo pajamų</button>
        </div>
        <input type="hidden" id="newcat_goaltype" value="amount" />
        <input id="newcat_goalval" type="text" inputmode="decimal" placeholder="pvz. 200 arba 15" />
      </div>
      <div id="newcat_loan_wrap" style="display:none;">
        <label class="field">Bendra paskolos suma (€)<input id="newcat_loantotal" type="text" inputmode="decimal" placeholder="pvz. 5000" /></label>
        <div style="height:10px;"></div>
        <label class="field">Minimali mėnesio įmoka (€)<input id="newcat_minpayment" type="text" inputmode="decimal" placeholder="pvz. 150" /></label>
        <div style="font-size:11px;color:var(--faint);margin-top:4px;">Įmoka bus įskaičiuota į mėnesio biudžetą. Sumokėjus bent tiek — juosta žalia, mažiau — raudona.</div>
      </div>
      <button type="submit" class="submit-btn">${ICONS.plus} Pridėti kategoriją</button>
    </form>

    <div class="section-label" style="margin-top:24px;">Pasikartojančios išlaidos</div>
    ${recurringRows || `<div class="empty">Nėra pasikartojančių išlaidų.</div>`}
    <form class="stack" style="margin-top:12px;" onsubmit="return submitAddRecurring(event)">
      <div style="display:flex;gap:8px;">
        <input id="rec_amount" type="text" inputmode="decimal" placeholder="Suma €" style="flex:1;" />
        <select id="rec_category" style="flex:1;">${state.categories.filter(c=>catType(c)!=="investment").map(c=>`<option value="${c}">${c}</option>`).join("")}</select>
      </div>
      <input id="rec_note" type="text" placeholder="Pastaba (pvz. Nuoma, Netflix)" />
      <button type="submit" class="submit-btn">${ICONS.plus} Pridėti pasikartojančias išlaidas</button>
    </form>
    <div style="font-size:12px;color:var(--faint);margin-top:8px;">Kiekvieno mėnesio 1 dieną automatiškai pridedama kaip išlaida.</div>

    <div class="section-label" style="margin-top:24px;">Banko išrašo importas</div>
    <label class="submit-btn" style="background:var(--blue);color:var(--ink);text-align:center;">
      ${ICONS.plus} Importuoti CSV failą<input type="file" accept=".csv,.txt,text/csv,text/plain,*/*" style="display:none;" onchange="handleCsvFile(this)" />
    </label>
    <div style="font-size:12px;color:var(--faint);margin-top:8px;">Įkelk iš banko atsisiųstą CSV išrašą — programėlė pasiūlys stulpelių atitikmenis ir kategorijas, tu peržiūri prieš patvirtindamas.</div>

    <div class="section-label" style="margin-top:24px;">Atsarginė kopija</div>
    <div style="display:flex;gap:8px;">
      <button type="button" class="submit-btn" style="background:var(--surface-light);color:var(--paper);" onclick="exportData()">Eksportuoti</button>
      <label class="submit-btn" style="background:var(--surface-light);color:var(--paper);text-align:center;">
        Importuoti<input type="file" accept="application/json" style="display:none;" onchange="importDataFile(this)" />
      </label>
    </div>
    ${exportReminder}

    <div class="section-label" style="margin-top:24px;">Mano biudžeto mėnuo</div>
    <div class="field-row">
      <span class="field-row-label">Prasideda mėnesio dieną</span>
      <div class="field-row-input"><input type="number" min="1" max="28" value="${state.budgetStartDay || 1}" onchange="updateBudgetStartDay(this.value)" /></div>
    </div>
    <div class="field-row-hint">Jei algą gauni ne 1-ą dieną (pvz. 15-ą), nustatyk tą dieną — Apžvalga rodys tavo asmeninį mėnesį, o Ataskaitoje galėsi rinktis tarp jo ir kalendorinio.</div>

    <div class="section-label" style="margin-top:24px;">Santaupos</div>
    <div class="field-row">
      <span class="field-row-label">Dabartinė santaupų suma</span>
      <div class="field-row-input"><span style="color:var(--faint)">€</span><input type="text" inputmode="decimal" value="${state.savingsBalance}" onchange="updateSavingsBalance(this.value)" /></div>
    </div>
    <div class="field-row-hint">Nustatyk savo tikrą santaupų sumą. Ji automatiškai sumažės, kai pažymėsi išlaidą kaip „apmokėta iš santaupų” (pvz. kelionėje) — tokios išlaidos neįskaičiuojamos į mėnesio biudžetą.</div>

    <div class="field-row">
      <span class="field-row-label">Minimali riba (įspėjimas)</span>
      <div class="field-row-input"><span style="color:var(--faint)">€</span><input type="text" inputmode="decimal" value="${state.savingsGoalMin || ''}" placeholder="0" onchange="updateSavingsGoalMin(this.value)" /></div>
    </div>
    <div class="field-row-hint">Jei santaupos nukris žemiau šios sumos, Apžvalgoje matysi įspėjimą. 0 = išjungta.</div>

    ${state.savingsLog.length ? `
      <div style="font-size:12px;color:var(--faint);margin-bottom:4px;">Paskutiniai koregavimai:</div>
      ${state.savingsLog.slice(0,5).map(l => `<div style="font-size:11px;color:var(--faint);padding:2px 0;">${l.date.split("-").reverse().join(".")}: €${fmt(l.from)} → €${fmt(l.to)}</div>`).join("")}
    ` : ""}

    ${(() => {
      const groups = {};
      state.expenses.filter(e => e.fromSavings && e.event).forEach(e => {
        const key = e.event.trim();
        groups[key] = (groups[key] || 0) + Number(e.amount);
      });
      const keys = Object.keys(groups);
      if (keys.length === 0) return "";
      return `<div class="section-label" style="margin-top:16px;">Kelionių / įvykių išlaidos (iš santaupų)</div>
        ${keys.map(k => `<div class="ledger-row" style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;"><span>${escapeHtml(k)}</span><span class="tape">€${fmt(groups[k])}</span></div>`).join("")}`;
    })()}

    <div class="section-label" style="margin-top:24px;">Pajamų bazė (proporcingam biudžetui)</div>
    <div class="field-row">
      <span class="field-row-label">Bazinis mėnesio atlyginimas</span>
      <div class="field-row-input"><span style="color:var(--faint)">€</span><input type="text" inputmode="decimal" value="${state.baseIncome || ''}" placeholder="pvz. 1000" onchange="updateBaseIncome(this.value)" /></div>
    </div>
    <div class="field-row-hint">Kai pajamos skiriasi nuo šios sumos, „lanksčių” kategorijų biudžetai automatiškai proporcingai padidėja arba sumažėja. „Būtinos” kategorijos (pvz. sąskaitos) nesikeičia. 0 = išjungta.</div>

    <div class="section-label" style="margin-top:28px;">Išvaizda ir sauga</div>
    <div class="field-row">
      <span class="field-row-label">Apžvalgos indikatorius</span>
      <div style="display:flex;gap:6px;">
        <button type="button" onclick="setGaugeStyle('ring')" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid ${state.gaugeStyle!=='fuel'?'var(--gold)':'rgba(237,234,224,0.15)'};background:${state.gaugeStyle!=='fuel'?'rgba(201,162,39,0.12)':'transparent'};color:${state.gaugeStyle!=='fuel'?'var(--gold)':'var(--faint)'};">Žiedas</button>
        <button type="button" onclick="setGaugeStyle('fuel')" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid ${state.gaugeStyle==='fuel'?'var(--gold)':'rgba(237,234,224,0.15)'};background:${state.gaugeStyle==='fuel'?'rgba(201,162,39,0.12)':'transparent'};color:${state.gaugeStyle==='fuel'?'var(--gold)':'var(--faint)'};">Rodyklė</button>
      </div>
    </div>
    <div class="field-row">
      <span class="field-row-label">Tema</span>
      <div style="display:flex;gap:6px;">
        <button type="button" onclick="setTheme('dark')" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid ${state.theme==='dark'?'var(--gold)':'rgba(237,234,224,0.15)'};background:${state.theme==='dark'?'rgba(201,162,39,0.12)':'transparent'};color:${state.theme==='dark'?'var(--gold)':'var(--faint)'};">Tamsi</button>
        <button type="button" onclick="setTheme('light')" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid ${state.theme==='light'?'var(--gold)':'rgba(237,234,224,0.15)'};background:${state.theme==='light'?'rgba(201,162,39,0.12)':'transparent'};color:${state.theme==='light'?'var(--gold)':'var(--faint)'};">Šviesi</button>
        <button type="button" onclick="setTheme('auto')" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid ${state.theme==='auto'?'var(--gold)':'rgba(237,234,224,0.15)'};background:${state.theme==='auto'?'rgba(201,162,39,0.12)':'transparent'};color:${state.theme==='auto'?'var(--gold)':'var(--faint)'};">Auto</button>
      </div>
    </div>
    <div class="field-row">
      <span class="field-row-label">Programėlės užraktas (PIN)</span>
      <button type="button" onclick="${state.appPin ? 'disableAppPin()' : 'promptSetPin()'}" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid ${state.appPin?'var(--green)':'rgba(237,234,224,0.15)'};background:${state.appPin?'rgba(111,191,115,0.12)':'transparent'};color:${state.appPin?'var(--green)':'var(--faint)'};">${state.appPin ? 'Įjungtas ✓' : 'Nustatyti'}</button>
    </div>
  </div>`;
}
function promptSetPin() {
  const pin = prompt("Sugalvok 4 skaitmenų PIN kodą programėlei atrakinti:");
  if (!pin) return;
  if (!/^\d{4}$/.test(pin)) { alert("PIN turi būti iš tiksliai 4 skaitmenų."); return; }
  state.appPin = pin;
  persistAll(); render();
  showToast("PIN kodas nustatytas");
}
function disableAppPin() {
  if (!confirm("Išjungti programėlės užraktą?")) return;
  state.appPin = null;
  persistAll(); render();
}
function submitAddRecurring(ev) {
  ev.preventDefault();
  const amount = document.getElementById("rec_amount").value;
  const category = document.getElementById("rec_category").value;
  const note = document.getElementById("rec_note").value;
  addRecurringTemplate(amount, category, note, "reikalinga");
  return false;
}
function updateBudgetStartDay(val) {
  const n = Math.min(28, Math.max(1, parseInt(val, 10) || 1));
  state.budgetStartDay = n;
  state.reportCursor = currentMonthKey();
  persistAll(); render();
}
function setGaugeStyle(style) { state.gaugeStyle = style; persistAll(); render(); }
function daysSinceExport() {
  if (!state.lastExportAt) return null;
  return Math.floor((Date.now() - new Date(state.lastExportAt).getTime()) / 86400000);
}
function exportData() {
  const payload = {
    expenses: state.expenses, incomes: state.incomes, budgets: state.budgets,
    categories: state.categories, categoryConfig: state.categoryConfig,
    baseIncome: state.baseIncome, gaugeStyle: state.gaugeStyle, theme: state.theme,
    recurringTemplates: state.recurringTemplates, budgetStartDay: state.budgetStartDay,
    merchantMap: state.merchantMap, importedHashes: state.importedHashes, savingsBalance: state.savingsBalance, netWorthHistory: state.netWorthHistory, exportedAt: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `biudzetas-atsarga-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  state.lastExportAt = new Date().toISOString();
  persistAll(); render();
}
function importDataFile(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.expenses) state.expenses = data.expenses;
      if (data.incomes) state.incomes = data.incomes;
      if (data.budgets) state.budgets = data.budgets;
      if (data.categories) state.categories = data.categories;
      if (data.categoryConfig) state.categoryConfig = data.categoryConfig;
      if (typeof data.baseIncome === "number") state.baseIncome = data.baseIncome;
      if (data.gaugeStyle) state.gaugeStyle = data.gaugeStyle;
      if (data.theme) state.theme = data.theme;
      if (data.recurringTemplates) state.recurringTemplates = data.recurringTemplates;
      if (typeof data.budgetStartDay === "number") state.budgetStartDay = data.budgetStartDay;
      if (data.merchantMap) state.merchantMap = data.merchantMap;
      if (data.importedHashes) state.importedHashes = data.importedHashes;
      if (typeof data.savingsBalance === "number") state.savingsBalance = data.savingsBalance;
      if (data.netWorthHistory) state.netWorthHistory = data.netWorthHistory;
      persistAll();
      applyTheme();
      render();
      alert("Duomenys sėkmingai atkurti.");
    } catch (err) {
      alert("Nepavyko nuskaityti failo — patikrink, ar tai teisingas atsarginės kopijos failas.");
    }
  };
  reader.readAsText(file);
}
function setNewCatType(t) {
  document.getElementById("newcat_type").value = t;
  document.getElementById("newcat_expense").classList.toggle("active", t === "expense");
  document.getElementById("newcat_invest").classList.toggle("active", t === "investment");
  document.getElementById("newcat_invest").classList.toggle("blue", t === "investment");
  document.getElementById("newcat_loan").classList.toggle("active", t === "loan");
  document.getElementById("newcat_loan").classList.toggle("blue", t === "loan");
  document.getElementById("newcat_goal_wrap").style.display = t === "investment" ? "block" : "none";
  document.getElementById("newcat_loan_wrap").style.display = t === "loan" ? "block" : "none";
  document.getElementById("newcat_essential_wrap").style.display = t === "expense" ? "flex" : "none";
  const helpTexts = {
    expense: "Įprasta mėnesio išlaida su biudžeto limitu.",
    investment: "Mėnesio įnašo TIKSLAS (pvz. į maklerio sąskaitą) — seka, kiek įneši kiekvieną mėnesį, ne bendrą turimą sumą. Tai skiriasi nuo „Santaupų” Nustatymuose, kurios yra vienas bendras, rankiniu būdu valdomas balansas.",
    loan: "Mažėjanti skola su minimalia mėnesio įmoka, kuri įskaičiuojama į biudžetą.",
  };
  document.getElementById("newcat_type_help").textContent = helpTexts[t];
}
function setNewCatGoalType(t) {
  document.getElementById("newcat_goaltype").value = t;
  document.getElementById("newcat_amount").classList.toggle("active", t === "amount");
  document.getElementById("newcat_amount").classList.toggle("blue", t === "amount");
  document.getElementById("newcat_percent").classList.toggle("active", t === "percent");
  document.getElementById("newcat_percent").classList.toggle("blue", t === "percent");
}
function confirmRename(oldName) { renameCategory(oldName, document.getElementById("edit_input").value); }
function renderImportMapping() {
  const { headers, dataRows, skippedRows } = state.importRaw;
  const m = state.importMapping;
  const colOptions = (selected) => `<option value="">–</option>` + headers.map((h,i) => `<option value="${i}" ${selected===i?'selected':''}>${h}</option>`).join("");
  const previewRows = dataRows.slice(0,3);
  const previewText = [headers, ...previewRows].map(r => r.join(" | ")).join("\n");
  const mojibake = looksMojibake(previewText);
  return `<div class="topbar"><div class="eyebrow">Banko išrašo importas</div></div>
  <div class="tabpanel fade-in">
    ${skippedRows > 0 ? `<div style="font-size:12px;color:var(--faint);margin-bottom:12px;">Praleista ${skippedRows} eilutė(-ių) prieš antraštę (aptikta automatiškai).</div>` : ""}
    ${mojibake ? `<div style="background:rgba(217,119,66,0.15);border:1px solid var(--rust);color:var(--rust);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:14px;">
      Tekste matosi keisti simboliai — failas galimai ne UTF-8 koduotėje.
      <button type="button" onclick="reReadWithEncoding('windows-1257')" style="display:block;margin-top:8px;background:var(--rust);color:var(--ink);border:none;border-radius:6px;padding:6px 10px;font-size:12px;">Bandyti kaip Windows-1257</button>
    </div>` : ""}
    <div class="section-label">1. Nurodyk, kur kas yra</div>
    <label class="field">Datos stulpelis<select onchange="updateImportMapping('dateCol', this.value)">${colOptions(m.dateCol)}</select></label>
    <div style="height:10px;"></div>
    <label class="field">Sumos stulpelis<select onchange="updateImportMapping('amountCol', this.value)">${colOptions(m.amountCol)}</select></label>
    <div style="height:10px;"></div>
    <label class="field">Aprašymo / gavėjo stulpelis (nebūtina)<select onchange="updateImportMapping('descCol', this.value)">${colOptions(m.descCol)}</select></label>
    ${m.currencyCol !== null ? `<div style="height:10px;"></div><label class="field">Valiutos stulpelis (aptikta — importuosime tik EUR)<select onchange="updateImportMapping('currencyCol', this.value)">${colOptions(m.currencyCol)}</select></label>` : ""}
    ${m.statusCol !== null ? `<div style="height:10px;"></div><label class="field">Būsenos stulpelis (aptikta — praleisim neįvykdytas)<select onchange="updateImportMapping('statusCol', this.value)">${colOptions(m.statusCol)}</select></label>` : ""}
    <label class="checkbox-field" style="margin-top:12px;"><input type="checkbox" ${m.allExpense?'checked':''} onchange="updateImportMapping('allExpense', this.checked)" /> Visos šio failo sumos yra išlaidos (ne pajamos)</label>

    <div class="section-label" style="margin-top:20px;">Peržiūra (antraštė + pirmos 3 eilutės)</div>
    <div style="overflow-x:auto;font-size:11px;color:var(--faint);border:1px solid rgba(237,234,224,0.1);border-radius:8px;padding:8px;">
      <div style="white-space:nowrap;padding:3px 0;color:var(--gold);font-weight:600;">${escapeHtml(headers.join(" | "))}</div>
      ${previewRows.map(r => `<div style="white-space:nowrap;padding:3px 0;border-bottom:1px solid rgba(237,234,224,0.06);">${escapeHtml(r.join(" | "))}</div>`).join("")}
    </div>

    <div style="display:flex;gap:8px;margin-top:20px;">
      <button type="button" class="submit-btn" style="flex:1;width:auto;" onclick="proceedToReview()">Toliau</button>
      <button type="button" class="submit-btn" style="background:var(--surface-light);color:var(--paper);flex:0 0 auto;width:auto;padding:0 18px;" onclick="cancelImport()">Atšaukti</button>
    </div>
  </div>`;
}

function renderImportReview() {
  const drafts = state.importDrafts;
  const includedCount = drafts.filter(d => d.include).length;
  const rows = drafts.map(d => `
    <div class="ledger-row" style="opacity:${d.include?1:0.4};">
      <div style="display:flex;align-items:flex-start;gap:8px;padding:6px 0;">
        <input type="checkbox" ${d.include?'checked':''} onchange="toggleDraftInclude('${d.id}')" style="margin-top:4px;" />
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(d.rawDesc) || "(be aprašymo)"}</div>
          <div style="font-size:11px;color:var(--faint);margin-bottom:6px;">${d.date.split("-").reverse().join(".")}${d.duplicate?' · <span style="color:var(--rust)">galima dublė</span>':''}</div>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
            <select onchange="updateDraftKind('${d.id}', this.value)" style="width:auto;height:32px;font-size:12px;padding:0 6px;">
              <option value="expense" ${d.kind==='expense'?'selected':''}>Išlaida</option>
              <option value="income" ${d.kind==='income'?'selected':''}>Pajama</option>
            </select>
            ${d.kind === "expense" ? `<select onchange="updateDraftCategory('${d.id}', this.value)" style="width:auto;height:32px;font-size:12px;padding:0 6px;">
              ${state.categories.map(c=>`<option value="${c}" ${d.category===c?'selected':''}>${c}</option>`).join("")}
            </select>` : ""}
            <span class="tape" style="font-size:13px;margin-left:auto;">€${fmt(d.amount)}</span>
          </div>
        </div>
      </div>
    </div>`).join("");

  return `<div class="topbar"><div class="eyebrow">Peržiūrėk prieš importuojant</div></div>
  <div class="tabpanel fade-in">
    <div style="font-size:12px;color:var(--faint);margin-bottom:12px;">Rasta ${drafts.length} įrašų. Pažymėti dublikatai (jau importuoti anksčiau) automatiškai nuimti — peržiūrėk kategorijas ir patvirtink.</div>
    ${state.importSkippedInfo ? `<div style="font-size:12px;color:var(--gold);margin-bottom:12px;">${state.importSkippedInfo}</div>` : ""}
    ${rows}
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button type="button" class="submit-btn" style="flex:1;width:auto;" onclick="confirmImport()">Importuoti pažymėtus (${includedCount})</button>
      <button type="button" class="submit-btn" style="background:var(--surface-light);color:var(--paper);flex:0 0 auto;width:auto;padding:0 18px;" onclick="cancelImport()">Atšaukti</button>
    </div>
  </div>`;
}
function submitAddCategory(ev) {
  ev.preventDefault();
  const name = document.getElementById("new_cat").value;
  const type = document.getElementById("newcat_type").value;
  const goalType = document.getElementById("newcat_goaltype") ? document.getElementById("newcat_goaltype").value : "amount";
  const goalVal = document.getElementById("newcat_goalval") ? document.getElementById("newcat_goalval").value : "0";
  const loanTotal = document.getElementById("newcat_loantotal") ? document.getElementById("newcat_loantotal").value : "0";
  const minPayment = document.getElementById("newcat_minpayment") ? document.getElementById("newcat_minpayment").value : "0";
  const essential = document.getElementById("newcat_essential") ? document.getElementById("newcat_essential").checked : true;
  if (type === "loan") {
    addCategory(name, type, null, loanTotal, essential, minPayment);
  } else {
    addCategory(name, type, goalType, goalType === "percent" ? goalVal : 0, essential);
    if (type === "investment" && goalType === "amount") { state.budgets[name.trim()] = parseFloat(String(goalVal).replace(",",".")) || 0; persistAll(); }
  }
  return false;
}

function renderHelp() {
  const section = (title, body) => `<div style="margin-bottom:18px;"><div class="display" style="font-size:15px;font-weight:600;color:var(--gold);margin-bottom:6px;">${title}</div><div style="font-size:13px;color:var(--paper);line-height:1.5;">${body}</div></div>`;
  return `<div class="topbar" style="display:flex;align-items:center;justify-content:space-between;">
    <div class="eyebrow">Pagalba</div>
    <button class="icon-btn" onclick="state.showHelp=false;render();" aria-label="Uždaryti">${ICONS.x}</button>
  </div>
  <div class="tabpanel fade-in">
    ${section("Apžvalga", "Rodo einamąjį mėnesį (arba tavo pasirinktą biudžeto laikotarpį). Indikatorius viršuje rodo likusį biudžetą — žalia/geltona/raudona. Paspaudus ant kategorijos, sąrašas filtruojasi tik jai.")}
    ${section("Pridėti", "Įvesk išlaidą arba pajamą. „Apmokėta iš santaupų” pažymėk, kai mokate iš anksčiau sutaupytų pinigų, ne iš šio mėnesio biudžeto — tokia suma nebus įskaičiuota į biudžeto skaičiavimą.")}
    ${section("Ataskaita", "Mėnesio arba metų suvestinė su automatiniais patarimais. Jei nustatei kitokią biudžeto mėnesio pradžios dieną, gali rinktis tarp „Mano mėnuo” ir „Kalendorinis”.")}
    ${section("Nustatymai", "Kategorijų valdymas (išlaidų / investicinė / paskolos tipas), pasikartojančios išlaidos, atsarginė kopija, santaupos, banko išrašo importas ir išvaizda.")}
    ${section("Kategorijų tipai", "<b>Išlaidų</b> — įprastas mėnesio biudžetas. <b>Investicinė</b> — tikslas, spalvos atvirkštinės (žalia = pasiektas). <b>Paskola</b> — mažėjantis likutis, kiekvienas įrašas sumažina liekamą skolą.")}
    ${section("Duomenų saugumas", "Visi duomenys saugomi tik šiame telefone/naršyklėje. Rekomenduojama kartkartėmis pasidaryti atsarginę kopiją (Nustatymai → Eksportuoti).")}
  </div>`;
}
function renderLockScreen() {
  const now = Date.now();
  const locked = state.pinLockedUntil && state.pinLockedUntil > now;
  const err = state.pinError ? `<div style="color:var(--rust);font-size:13px;margin-top:10px;">${state.pinError}</div>` : "";
  const secsLeft = locked ? Math.ceil((state.pinLockedUntil - now) / 1000) : 0;
  return `<div style="min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;">
    <div style="color:var(--gold);margin-bottom:16px;">${ICONS.lock}</div>
    <div class="display" style="font-size:18px;font-weight:600;margin-bottom:16px;">Programėlė užrakinta</div>
    ${locked ? `
      <div style="color:var(--rust);font-size:14px;">Per daug bandymų. Palauk ${secsLeft} sek.</div>
    ` : `
      <form onsubmit="return submitPin(event)" style="width:100%;max-width:220px;">
        <input id="pin_input" type="password" inputmode="numeric" maxlength="4" placeholder="••••" autofocus style="text-align:center;font-size:22px;letter-spacing:8px;" />
        <button type="submit" class="submit-btn" style="margin-top:14px;">Atrakinti</button>
      </form>
      ${err}
    `}
  </div>`;
}
let pinLockTimer = null;
function submitPin(ev) {
  ev.preventDefault();
  const val = document.getElementById("pin_input").value;
  if (val === state.appPin) {
    state.appLocked = false; state.pinError = null; state.pinAttempts = 0; render();
  } else {
    state.pinAttempts = (state.pinAttempts || 0) + 1;
    if (state.pinAttempts >= 3) {
      state.pinLockedUntil = Date.now() + 30000;
      state.pinAttempts = 0;
      state.pinError = null;
      render();
      clearInterval(pinLockTimer);
      pinLockTimer = setInterval(() => {
        if (!state.pinLockedUntil || state.pinLockedUntil <= Date.now()) {
          clearInterval(pinLockTimer); state.pinLockedUntil = null; render();
        } else { render(); }
      }, 1000);
    } else {
      state.pinError = `Neteisingas PIN kodas. Liko bandymų: ${3 - state.pinAttempts}.`;
      render();
    }
  }
  return false;
}

function render() {
  const app = document.getElementById("app");
  if (state.appPin && state.appLocked) {
    app.innerHTML = renderLockScreen();
    const pi = document.getElementById("pin_input");
    if (pi) pi.focus();
    return;
  }
  if (state.showHelp) { app.innerHTML = renderHelp(); return; }
  if (state.importStep === "mapping") { app.innerHTML = renderImportMapping(); return; }
  if (state.importStep === "review") { app.innerHTML = renderImportReview(); return; }
  let body = "";
  if (state.tab === "overview") body = renderOverview();
  else if (state.tab === "add") body = renderAdd();
  else if (state.tab === "report") body = renderReport();
  else if (state.tab === "rules") body = renderRules();
  else if (state.tab === "settings") body = renderSettings();

  app.innerHTML = body + `
    <div class="bottom-nav">
      <button class="nav-item ${state.tab==='overview'?'active':''}" onclick="setTab('overview')">${ICONS.wallet}Apžvalga</button>
      <button class="nav-item ${state.tab==='add'?'active':''}" onclick="setTab('add')">${ICONS.plus}Pridėti</button>
      <button class="nav-item ${state.tab==='report'?'active':''}" onclick="setTab('report')">${ICONS.file}Ataskaita</button>
      <button class="nav-item ${state.tab==='rules'?'active':''}" onclick="setTab('rules')">${ICONS.rules}Taisyklės</button>
      <button class="nav-item ${state.tab==='settings'?'active':''}" onclick="setTab('settings')">${ICONS.settings}Nustatymai</button>
    </div>`;

  if (state.tab === "overview") attachSwipeHandlers();
  attachTabSwipe();
  if (state._focusSearch) {
    const si = document.getElementById("search_input");
    if (si) { si.focus(); const len = si.value.length; si.setSelectionRange(len, len); }
    state._focusSearch = false;
  }
  if (state.tab === "add" && state.addSubtab === "expense" && !state.editingExpenseId) setNecessity("reikalinga");
}
function setTab(t) {
  if (t === "report") state.reportCursor = currentMonthKey();
  state.tab = t;
  render();
}

applyTheme();
applyRecurringTemplates();
recordNetWorthSnapshot();
if (state.appPin) state.appLocked = true;
render();
window.scrollTo(0, 0);

document.addEventListener("visibilitychange", () => {
  if (document.hidden && state.appPin) {
    state.appLocked = true;
  }
});

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
