        <div class="ledger-row" style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-top:1px solid rgba(237,234,224,0.08);margin-top:4px;">
          <span>Nepriskirta</span><span class="tape" style="color:var(--faint);">€${fmt(unallocated)}</span>
        </div>`;
    })()}
    </div>

    ${settingsSectionHeader('incomebase', 'Pajamų bazė (proporcingam biudžetui)', state.baseIncome ? `€${fmt(state.baseIncome)}/mėn.` : 'Išjungta')}
    <div class="settings-collapse ${state.settingsExpanded['incomebase']?'expanded':''}">
    <div class="field-row">
      <span class="field-row-label">Bazinis mėnesio atlyginimas</span>
      <div class="field-row-input"><span style="color:var(--faint)">€</span><input type="text" inputmode="decimal" value="${state.baseIncome || ''}" placeholder="pvz. 1000" onchange="updateBaseIncome(this.value)" /></div>
    </div>
    <div class="field-row-hint">Kai pajamos skiriasi nuo šios sumos, „lanksčių” kategorijų biudžetai automatiškai proporcingai padidėja arba sumažėja. „Būtinos” kategorijos (pvz. sąskaitos) nesikeičia. 0 = išjungta.</div>
    </div>
  </div>`;
}
function renderSettings() {
  const rows = state.categories.map((c, idx) => {
    const catT = catType(c);
    const isInv = catT === "investment";
    const isSavingsGoal = catT === "savingsgoal";
    const isLoan = catT === "loan";
    const cfg = state.categoryConfig[c] || {};
    if (state.editingCategory === c) {
      return `<div class="settings-row ledger-row" style="flex-direction:column;align-items:stretch;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
          <input id="edit_emoji" type="text" value="${cfg.emoji||''}" maxlength="2" placeholder="🏷️" style="width:52px;text-align:center;padding:0 6px;" onchange="updateCategoryEmoji('${c}', this.value)" />
          <input id="edit_input" type="text" value="${c}" style="padding:0 8px;font-size:14px;" onkeydown="if(event.key==='Escape'){state.editingCategory=null;render();}" />
          <button class="icon-btn" style="color:var(--gold)" onclick="confirmRename('${c}')">${ICONS.check}</button>
          <button class="icon-btn" onclick="state.editingCategory=null;render();">${ICONS.x}</button>
        </div>
        <div class="toggle-row" style="margin-bottom:6px;">
          <button type="button" class="toggle-btn ${catT==='expense'?'active':''}" onclick="setCategoryType('${c}','expense')">Išlaidų</button>
          <button type="button" class="toggle-btn ${isInv?'active blue':''}" onclick="setCategoryType('${c}','investment')">Investicinė</button>
        </div>
        <div class="toggle-row" style="margin-bottom:8px;">
          <button type="button" class="toggle-btn ${isSavingsGoal?'active blue':''}" onclick="setCategoryType('${c}','savingsgoal')">Taupymo tikslas</button>
          <button type="button" class="toggle-btn ${isLoan?'active blue':''}" onclick="setCategoryType('${c}','loan')">Paskola</button>
        </div>
        ${(isInv || isSavingsGoal) ? `
          <div class="toggle-row" style="margin-bottom:8px;">
            <button type="button" class="toggle-btn ${cfg.goalType!=='percent'?'active blue':''}" onclick="updateCategoryGoal('${c}','goalType','amount')">€ suma</button>
            <button type="button" class="toggle-btn ${cfg.goalType==='percent'?'active blue':''}" onclick="updateCategoryGoal('${c}','goalType','percent')">% nuo pajamų</button>
          </div>
          ${cfg.goalType === "percent" ?
            `<input type="text" inputmode="decimal" value="${cfg.goalPercent ?? 10}" placeholder="pvz. 15" onchange="updateCategoryGoal('${c}','goalPercent', this.value)" style="max-width:120px;" />
             <div style="font-size:11px;color:var(--faint);margin-top:4px;">% nuo mėnesio pajamų</div>` :
            `<div style="display:flex;align-items:center;gap:4px;"><span style="color:var(--faint)">€</span><input type="text" inputmode="decimal" value="${state.budgets[c] ?? ''}" style="max-width:100px;" onchange="updateBudget('${c}', this.value)" /><span style="font-size:11px;color:var(--faint);">tikslas / mėn.</span></div>`
          }
          <div style="font-size:11px;color:var(--faint);margin-top:6px;">${isSavingsGoal ? 'Taupymo tikslas — pinigai kaupiasi konkrečiam dalykui, neskaičiuojama kaip investicinis augimas.' : 'Investicija — skaičiuojama į Grynąjį turtą kaip augantis turtas.'}</div>
          ${isSavingsGoal ? `
            <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(237,234,224,0.08);">
              <div style="font-size:11px;color:var(--faint);margin-bottom:6px;">Nebūtina: jei žinai konkrečią sumą ir datą, paskaičiuosime, kiek reikia atidėti per mėnesį.</div>
              <div style="display:flex;gap:8px;margin-bottom:6px;">
                <div style="display:flex;align-items:center;gap:4px;flex:1;"><span style="color:var(--faint)">€</span><input type="text" inputmode="decimal" value="${cfg.targetAmount ?? ''}" placeholder="Tikslo suma" onchange="updateCategoryTargetAmount('${c}', this.value)" /></div>
                <input type="date" value="${cfg.targetDate ?? ''}" onchange="updateCategoryTargetDate('${c}', this.value)" style="flex:1;" />
              </div>
              ${(() => {
                const proj = requiredMonthlyForGoal(c);
                if (!proj) return "";
                return proj.monthly !== null
                  ? `<div style="font-size:12px;">Reikia atidėti: <span class="tape" style="color:var(--gold);">€${fmt(proj.monthly)}/mėn.</span> (${proj.months} mėn. liko, trūksta €${fmt(proj.remaining)})</div>`
                  : `<div style="font-size:12px;">Liko iki tikslo: <span class="tape" style="color:var(--gold);">€${fmt(proj.remaining)}</span></div>`;
              })()}
            </div>
          ` : ""}
        ` : isLoan ? `
          <div style="display:flex;align-items:center;gap:4px;margin-bottom:8px;"><span style="color:var(--faint)">€</span><input type="text" inputmode="decimal" value="${cfg.loanTotal ?? ''}" style="max-width:120px;" onchange="updateCategoryGoal('${c}','loanTotal', this.value)" /><span style="font-size:11px;color:var(--faint);">bendra paskolos suma</span></div>
          <div style="display:flex;align-items:center;gap:4px;margin-bottom:8px;"><span style="color:var(--faint)">€</span><input type="text" inputmode="decimal" value="${cfg.minPayment ?? ''}" style="max-width:120px;" onchange="updateCategoryGoal('${c}','minPayment', this.value)" /><span style="font-size:11px;color:var(--faint);">minimali mėn. įmoka</span></div>
          <div style="display:flex;align-items:center;gap:4px;"><input type="text" inputmode="decimal" value="${cfg.interestRate ?? ''}" style="max-width:70px;" onchange="updateCategoryGoal('${c}','interestRate', this.value)" /><span style="font-size:11px;color:var(--faint);">% metinė palūkana (nebūtina, reikia „Lavinos” strategijai)</span></div>
          <div style="font-size:11px;color:var(--faint);margin-top:4px;">Sumokėta iki šiol: €${fmt(allTimePaidForCategory(c))} · Liko: €${fmt(loanRemaining(c))}</div>
        ` : `
          <div style="display:flex;align-items:center;gap:4px;margin-bottom:8px;"><span style="color:var(--faint)">€</span><input type="text" inputmode="decimal" value="${state.budgets[c] ?? ''}" style="max-width:100px;" onchange="updateBudget('${c}', this.value)" /><span style="font-size:11px;color:var(--faint);">biudžetas / mėn.</span></div>
          <label class="checkbox-field"><input type="checkbox" ${isEssential(c)?'checked':''} onchange="toggleEssential('${c}')" /> Būtina išlaida (biudžetas nesikeičia, jei pajamos svyruoja)</label>
        `}
      </div>`;
    }
    const rightSide = isInv
      ? `<span class="cat-tag" style="margin-right:6px;">Investicija</span><span class="tape" style="font-size:13px;color:var(--faint);">${cfg.goalType==='percent' ? `${cfg.goalPercent||0}% pajamų` : `€${fmt(state.budgets[c]||0)}`}</span>`
      : isSavingsGoal
      ? `<span class="cat-tag" style="color:var(--gold);border-color:var(--gold);margin-right:6px;">Taupymo tikslas</span><span class="tape" style="font-size:13px;color:var(--faint);">${cfg.goalType==='percent' ? `${cfg.goalPercent||0}% pajamų` : `€${fmt(state.budgets[c]||0)}`}</span>`
      : isLoan
      ? `<span class="cat-tag" style="color:var(--blue);border-color:var(--blue);margin-right:6px;">Paskola</span><span class="tape" style="font-size:13px;color:var(--faint);">liko €${fmt(loanRemaining(c))}</span>`
      : `<span class="cat-tag" style="${isEssential(c) ? '' : 'border-color:var(--gold);color:var(--gold);'}margin-right:6px;">${isEssential(c) ? 'būtina' : 'lanksti'}</span><span class="tape" style="font-size:13px;color:var(--faint);">€${fmt(state.budgets[c]||0)}</span>`;
    return `<div class="settings-row ledger-row">
      ${state.reorderingCategories ? `<div style="display:flex;flex-direction:column;gap:0;flex-shrink:0;">
        <button class="icon-btn" style="padding:1px;${idx===0?'opacity:.25':''}" ${idx===0?'disabled':''} onclick="moveCategory('${c}',-1)" aria-label="Aukštyn">▲</button>
        <button class="icon-btn" style="padding:1px;${idx===state.categories.length-1?'opacity:.25':''}" ${idx===state.categories.length-1?'disabled':''} onclick="moveCategory('${c}',1)" aria-label="Žemyn">▼</button>
      </div>` : ""}
      <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;">
        <span style="font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${catEmoji(c)}${c}</span>
        <button class="icon-btn" onclick="state.editingCategory='${c}';render();" aria-label="Redaguoti ${c}">${ICONS.pencil}</button>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
        ${rightSide}
        <button class="icon-btn" style="color:var(--rust);${state.categories.length<=1?'opacity:.3':''}" ${state.categories.length<=1?'disabled':''} onclick="deleteCategory('${c}')" aria-label="Ištrinti ${c}">${ICONS.trash}</button>
      </div>
    </div>`;
  }).join("");

  return `<div class="topbar" style="display:flex;align-items:center;justify-content:space-between;">
    <div class="eyebrow">Nustatymai</div>
    <button class="icon-btn" onclick="state.showHelp=true;render();" aria-label="Pagalba" style="border:1px solid rgba(237,234,224,0.15);border-radius:14px;padding:5px 12px;font-size:12px;">Pagalba</button>
  </div>
  <div class="tabpanel fade-in">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div class="section-label" style="margin-bottom:0;">Kategorijos</div>
      <button type="button" onclick="state.reorderingCategories=!state.reorderingCategories;render();" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid ${state.reorderingCategories?'var(--gold)':'rgba(237,234,224,0.15)'};background:${state.reorderingCategories?'rgba(201,162,39,0.12)':'transparent'};color:${state.reorderingCategories?'var(--gold)':'var(--faint)'};">${state.reorderingCategories?'Baigta':'Tvarkyti'}</button>
    </div>
    ${rows}
    <form class="stack" style="margin-top:16px;" onsubmit="return submitAddCategory(event)">
      <label class="field">Nauja kategorija<input id="new_cat" type="text" placeholder="pvz. Investicijos, Kelionės" /></label>
      <label class="field">Tipas
        <div class="toggle-row">
          <button type="button" class="toggle-btn active" id="newcat_expense" onclick="setNewCatType('expense')">Išlaidų</button>
          <button type="button" class="toggle-btn" id="newcat_invest" onclick="setNewCatType('investment')">Investicinė</button>
        </div>
        <div class="toggle-row" style="margin-top:6px;">
          <button type="button" class="toggle-btn" id="newcat_savingsgoal" onclick="setNewCatType('savingsgoal')">Taupymo tikslas</button>
          <button type="button" class="toggle-btn" id="newcat_loan" onclick="setNewCatType('loan')">Paskola</button>
        </div>
        <div id="newcat_type_help" style="font-size:11px;color:var(--faint);margin-top:6px;">Įprasta mėnesio išlaida su biudžeto limitu.</div>
      </label>
      <input type="hidden" id="newcat_type" value="expense" />
      <label class="checkbox-field" id="newcat_essential_wrap"><input type="checkbox" id="newcat_essential" checked /> Būtina išlaida (biudžetas nesikeičia, jei pajamos svyruoja)</label>

function daysSinceLastEntry() {
  const all = [...state.expenses, ...state.incomes];
  if (all.length === 0) return null;
  const latest = all.reduce((max, e) => e.date > max ? e.date : max, all[0].date);
  const latestDate = new Date(latest + "T00:00:00");
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.floor((today - latestDate) / 86400000);
}
async function checkAndShowReminder() {
  if (!state.remindersEnabled) return;
  if (typeof Notification === "undefined" || Notification.permission !== "granted") return;
  const days = daysSinceLastEntry();

  const today = new Date().toISOString().slice(0,10);
  if (state.lastReminderShownAt === today) return;
  state.lastReminderShownAt = today;
  save("lastReminderShownAt", today);
  try {
    if (navigator.serviceWorker && navigator.serviceWorker.ready) {
      const reg = await navigator.serviceWorker.ready;
      reg.showNotification("Biudžeto knyga", {
        body: `Jau ${days} d. neįrašei jokios išlaidos ar pajamos — atidaryk, kad nepamirštum.`,
        icon: "icon-192.png",

function computeUnusedBudget(monthKey) {
  const d = monthData(monthKey, "budget");
  const expenseCats = state.categories.filter(c => catType(c) === "expense");
  const rows = expenseCats.map(c => {
    const budget = effectiveBudget(c, monthKey, "budget");
    const spent = d.byCategory[c] || 0;
    const unused = Math.max(0, budget - spent);
    return { category: c, budget, spent, unused };
  }).filter(r => r.budget > 0 && r.unused > 0.01);
  const total = rows.reduce((s,r) => s + r.unused, 0);
  return { rows, total };
}
function checkBudgetRollover() {
  const prevKey = shiftedMonthKey(currentMonthKey(), -1);
  if (state.rolloverResolvedMonths.includes(prevKey)) return;
  if (!monthHasData(prevKey, "budget")) return;
  const { total } = computeUnusedBudget(prevKey);
  if (total <= 0.01) { state.rolloverResolvedMonths.push(prevKey); save("rolloverResolvedMonths", state.rolloverResolvedMonths); return; }
  state.showRolloverPrompt = prevKey;
}

function csvCell(v) { return `"${String(v ?? "").replace(/"/g, '""')}"`; }
function exportCSV() {
  const rows = [["Data","Tipas","Kategorija / pavadinimas","Suma (€)","Pastaba","Būtina","Iš santaupų"]];
  const all = [
    ...state.expenses.map(e => ({date:e.date, type:"Išlaida", cat:e.category, amount:e.amount, note:e.note||"", necessity:e.necessity==="nereikalinga"?"Ne":"Taip", fromSavings:e.fromSavings?"Taip":""})),
    ...state.incomes.map(i => ({date:i.date, type:"Pajama", cat:i.label, amount:i.amount, note:"", necessity:"", fromSavings:""})),
  ].sort((a,b) => a.date.localeCompare(b.date));
  all.forEach(r => rows.push([r.date, r.type, r.cat, String(r.amount).replace(".",","), r.note, r.necessity, r.fromSavings]));
  const csvText = rows.map(r => r.map(csvCell).join(",")).join("\r\n");
  const blob = new Blob(["\uFEFF" + csvText], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `biudzetas-israsai-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("CSV failas atsiųstas");
}
function importDataFile(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.expenses) state.expenses = data.expenses;
      if (data.incomes) state.incomes = data.incomes;
      if (data.budgets) state.budgets = data.budgets;
      if (data.categories) state.categories = data.categories;
      if (data.categoryConfig) state.categoryConfig = data.categoryConfig;
      if (typeof data.baseIncome === "number") state.baseIncome = data.baseIncome;
      if (data.gaugeStyle) state.gaugeStyle = data.gaugeStyle;
      if (data.theme) state.theme = data.theme;
      if (data.recurringTemplates) state.recurringTemplates = data.recurringTemplates;
      if (typeof data.budgetStartDay === "number") state.budgetStartDay = data.budgetStartDay;
      if (data.merchantMap) state.merchantMap = data.merchantMap;
      if (data.importedHashes) state.importedHashes = data.importedHashes;
      if (typeof data.savingsBalance === "number") state.savingsBalance = data.savingsBalance;
      if (data.netWorthHistory) state.netWorthHistory = data.netWorthHistory;
      if (data.recurringIncomes) state.recurringIncomes = data.recurringIncomes;
      if (data.holdings) state.holdings = data.holdings;
      if (typeof data.finnhubApiKey === "string") state.finnhubApiKey = data.finnhubApiKey;
      if (data.cryptoHoldings) state.cryptoHoldings = data.cryptoHoldings;
      persistAll();
      applyTheme();
      render();
      alert("Duomenys sėkmingai atkurti.");
    } catch (err) {
      alert("Nepavyko nuskaityti failo — patikrink, ar tai teisingas atsarginės kopijos failas.");
    }
  };
  reader.readAsText(file);
}

function submitAddCategory(ev) {
  ev.preventDefault();

  const type = document.getElementById("newcat_type").value;
  const goalType = document.getElementById("newcat_goaltype") ? document.getElementById("newcat_goaltype").value : "amount";
  const goalVal = document.getElementById("newcat_goalval") ? document.getElementById("newcat_goalval").value : "0";
  const loanTotal = document.getElementById("newcat_loantotal") ? document.getElementById("newcat_loantotal").value : "0";
  const minPayment = document.getElementById("newcat_minpayment") ? document.getElementById("newcat_minpayment").value : "0";
  const essential = document.getElementById("newcat_essential") ? document.getElementById("newcat_essential").checked : true;
  if (type === "loan") {
    addCategory(name, type, null, loanTotal, essential, minPayment);
  } else {
    addCategory(name, type, goalType, goalType === "percent" ? goalVal : 0, essential);
    if ((type === "investment" || type === "savingsgoal") && goalType === "amount") { state.budgets[name.trim()] = parseFloat(String(goalVal).replace(",",".")) || 0; persistAll(); }
    if (type === "savingsgoal") {
      const targetAmount = document.getElementById("newcat_targetamount") ? document.getElementById("newcat_targetamount").value : "";
      const targetDate = document.getElementById("newcat_targetdate") ? document.getElementById("newcat_targetdate").value : "";
      const trimmedName = name.trim();
      if (targetAmount) updateCategoryTargetAmount(trimmedName, targetAmount);
      if (targetDate) updateCategoryTargetDate(trimmedName, targetDate);
    }
  }
  return false;
}

function renderLockScreen() {
  const now = Date.now();
  const locked = state.pinLockedUntil && state.pinLockedUntil > now;
  const err = state.pinError ? `<div style="color:var(--rust);font-size:13px;margin-top:10px;">${state.pinError}</div>` : "";
  const secsLeft = locked ? Math.ceil((state.pinLockedUntil - now) / 1000) : 0;
  return `<div style="min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;">
    <div style="color:var(--gold);margin-bottom:16px;">${ICONS.lock}</div>
    <div class="display" style="font-size:18px;font-weight:600;margin-bottom:16px;">Programėlė užrakinta</div>
    ${locked ? `
      <div style="color:var(--rust);font-size:14px;">Per daug bandymų. Palauk ${secsLeft} sek.</div>
    ` : `
      <form onsubmit="return submitPin(event)" style="width:100%;max-width:220px;">
        <input id="pin_input" type="password" inputmode="numeric" maxlength="4" placeholder="••••" autofocus style="text-align:center;font-size:22px;letter-spacing:8px;" />
        <button type="submit" class="submit-btn" style="margin-top:14px;">Atrakinti</button>
      </form>
      ${err}
    `}
  </div>`;
}
let pinLockTimer = null;
function submitPin(ev) {
  ev.preventDefault();
  const val = document.getElementById("pin_input").value;
  if (val === state.appPin) {
    state.appLocked = false; state.pinError = null; state.pinAttempts = 0; render();
  } else {
    state.pinAttempts = (state.pinAttempts || 0) + 1;
    if (state.pinAttempts >= 3) {
      state.pinLockedUntil = Date.now() + 30000;
      state.pinAttempts = 0;
      state.pinError = null;
      render();
      clearInterval(pinLockTimer);
      pinLockTimer = setInterval(() => {
        if (!state.pinLockedUntil || state.pinLockedUntil <= Date.now()) {
          clearInterval(pinLockTimer); state.pinLockedUntil = null; render();
        } else { render(); }
      }, 1000);
    } else {
      state.pinError = `Neteisingas PIN kodas. Liko bandymų: ${3 - state.pinAttempts}.`;
      render();
    }
  }
  return false;
}

  try {
    renderInner();
  } catch (err) {
    console.error(err);
    const app = document.getElementById("app");
    app.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;gap:14px;padding:24px;text-align:center;">
      <div style="font-size:36px;">⚠️</div>
      <div style="font-size:16px;font-weight:600;color:#EDEAE0;">Kažkas nutiko</div>
      <div style="font-size:13px;color:#8FA098;">Programėlė aptiko klaidą ir negalėjo tęsti. Tavo duomenys saugūs — jie nepaveikti.</div>
      <button type="button" onclick="location.reload()" style="background:#C9A227;color:#1B2420;border:none;border-radius:10px;padding:10px 22px;font-size:14px;font-weight:600;margin-top:6px;">Įkelti iš naujo</button>
      <div style="font-size:11px;color:#8FA098;margin-top:14px;max-width:320px;word-break:break-word;">Techninė informacija (nusiųsk šį tekstą, jei praneši apie klaidą):<br><span style="font-family:monospace;">${(err && err.message ? err.message : String(err)).replace(/[<>]/g,"")}</span></div>
    </div>`;
  }
}
function renderInner() {
  const app = document.getElementById("app");
  app.style.zoom = state.fontSize === "large" ? "1.15" : state.fontSize === "small" ? "0.9" : "1";
  if (state.tab !== lastRenderedTab) {
    lastRenderedTab = state.tab;
    window.scrollTo(0, 0);
  }
  if (state.appPin && state.appLocked) {
    app.innerHTML = renderLockScreen();
    const pi = document.getElementById("pin_input");
    if (pi) pi.focus();
    return;
  }
  if (state.showRolloverPrompt) { app.innerHTML = renderRolloverPrompt(); return; }
  if (state.showHelp) { app.innerHTML = renderHelp(); return; }
  if (state.showWrapped) { app.innerHTML = renderWrapped(); return; }
  if (state.importStep === "mapping") { app.innerHTML = renderImportMapping(); return; }
  if (state.importStep === "review") { app.innerHTML = renderImportReview(); return; }
  if (state.portfolioImportStep === "mapping") { app.innerHTML = renderPortfolioImportMapping(); return; }
  if (state.portfolioImportStep === "review") { app.innerHTML = renderPortfolioImportReview(); return; }
  let body = "";
  if (state.tab === "overview") body = renderOverview();
  else if (state.tab === "add") body = renderAdd();
  else if (state.tab === "report") body = renderReport();
  else if (state.tab === "rules") body = renderRules();
  else if (state.tab === "finance") body = renderFinance();
  else if (state.tab === "settings") body = renderSettings();

  app.innerHTML = body + `
    <div class="bottom-nav">
      <button class="nav-item ${state.tab==='overview'?'active':''}" onclick="setTab('overview')">${ICONS.wallet}Apžvalga</button>
      <button class="nav-item ${state.tab==='add'?'active':''}" onclick="setTab('add')">${ICONS.plus}Pridėti</button>
      <button class="nav-item ${state.tab==='report'?'active':''}" onclick="setTab('report')">${ICONS.file}Ataskaita</button>
      <button class="nav-item ${state.tab==='rules'?'active':''}" onclick="setTab('rules')">${ICONS.rules}Taisyklės</button>
      <button class="nav-item ${state.tab==='finance'?'active':''}" onclick="setTab('finance')">${ICONS.finance}Finansai</button>
      <button class="nav-item ${state.tab==='settings'?'active':''}" onclick="setTab('settings')">${ICONS.settings}Nustatymai</button>
    </div>`;

  if (state.tab === "overview") attachSwipeHandlers();
  attachTabSwipe();
  if (state._focusSearch) {
    const si = document.getElementById("search_input");
    if (si) { si.focus(); const len = si.value.length; si.setSelectionRange(len, len); }
    state._focusSearch = false;
  }
  if (state.tab === "add" && state.addSubtab === "expense" && !state.editingExpenseId) setNecessity("reikalinga");
}
function setTab(t) {
  if (t === "report") state.reportCursor = currentMonthKey();
  state.tab = t;
  render();
}

const PERSISTED_KEYS = ["expenses","incomes","budgets","categories","categoryConfig","baseIncome","gaugeStyle","theme","lastExportAt","recurringTemplates","budgetStartDay","savingsBalance","savingsGoalMin","savingsLog","merchantMap","importedHashes","appPin","debtStrategy","appliedRules","ruleSnapshots","netWorthHistory","recurringIncomes","csvMappingMemory","holdings","finnhubApiKey","cryptoHoldings","fontSize","categoryViewStyle","remindersEnabled","lastReminderShownAt","rolloverResolvedMonths"];

const KEY_SCHEMA = {
  expenses: "array", incomes: "array", budgets: "object", categories: "array", categoryConfig: "object",
  baseIncome: "number", gaugeStyle: "string", theme: "string", lastExportAt: "string",
  recurringTemplates: "array", budgetStartDay: "number", savingsBalance: "number", savingsGoalMin: "number",
  savingsLog: "array", merchantMap: "object", importedHashes: "array", appPin: "string",
  debtStrategy: "string", appliedRules: "object", ruleSnapshots: "object", netWorthHistory: "array",
  recurringIncomes: "array", csvMappingMemory: "object", holdings: "array", finnhubApiKey: "string",
  cryptoHoldings: "array",
  fontSize: "string",
  categoryViewStyle: "string",
  remindersEnabled: "boolean",
  lastReminderShownAt: "string",
  rolloverResolvedMonths: "array",
};
function typeMatches(val, expected) {
  if (val === null || val === undefined) return true;
  if (expected === "array") return Array.isArray(val);
  if (expected === "object") return typeof val === "object" && !Array.isArray(val);
  if (expected === "number") return typeof val === "number" && !isNaN(val);
  if (expected === "string") return typeof val === "string";
  if (expected === "boolean") return typeof val === "boolean";
  return true;
}

async function boot() {
  let loaded = {};
  try {
    if (idbAvailable) {
      await migrateLocalStorageToIDB();
      loaded = await idbGetAll();
    } else {
      throw new Error("no-idb");
    }
  } catch (_) {
    idbAvailable = false;
    PERSISTED_KEYS.forEach(k => {
      try { const v = localStorage.getItem(k); if (v) loaded[k] = JSON.parse(v); } catch (_) {}
    });
  }
  const corrupted = [];
  PERSISTED_KEYS.forEach(k => {
    if (loaded[k] !== undefined) {
      if (typeMatches(loaded[k], KEY_SCHEMA[k])) { state[k] = loaded[k]; }
      else { corrupted.push(k); }
    }
  });
  if (corrupted.length > 0) { state.dataIntegrityWarning = corrupted; }

  state.categories.forEach(c => { if (!state.categoryConfig[c]) state.categoryConfig[c] = { type: "expense", essential: true }; });
  state.reportCursor = currentMonthKey();

  applyTheme();
  applyRecurringTemplates();
  applyRecurringIncomes();
  recordNetWorthSnapshot();
  checkAndShowReminder();
  checkBudgetRollover();
  if (state.appPin) state.appLocked = true;
  render();
  window.scrollTo(0, 0);
}
boot();

let lastGlobalErrorAt = 0;
function handleGlobalError(err) {
  const now = Date.now();
  if (now - lastGlobalErrorAt < 2000) return;
  lastGlobalErrorAt = now;
  console.error(err);
  render();
}
window.addEventListener("error", (e) => handleGlobalError(e.error || e.message));
window.addEventListener("unhandledrejection", (e) => handleGlobalError(e.reason));

document.addEventListener("visibilitychange", () => {
  if (document.hidden && state.appPin) {
    state.appLocked = true;
  }
});

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then((reg) => {
      reg.update().catch(() => {});
    }).catch(() => {});
  });
  let refreshedOnce = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (refreshedOnce) return;
    refreshedOnce = true;
    window.location.reload();
  });
}
</script>
</body>
</html>
