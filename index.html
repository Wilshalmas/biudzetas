<style>
  :root {
    --ink: #1B2420; --surface: #22302A; --surface-light: #2A3B33; --paper: #EDEAE0;
    --gold: #C9A227; --green: #6FBF73; --rust: #D97742; --faint: #8FA098; --blue: #6FA3BF;
  }
  :root.theme-light {
    --ink: #F4F1E8; --surface: #E9E4D6; --surface-light: #DED7C4; --paper: #262E28;
    --gold: #A8791C; --green: #3F8B52; --rust: #B85A2E; --faint: #6E7A70; --blue: #3E7691;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; min-width: 0; }
  html { overflow-x: hidden; height: 100%; }
  html, body { margin: 0; padding: 0; background: var(--ink); color: var(--paper); font-family: 'IBM Plex Sans', system-ui, sans-serif; }
  body { padding-bottom: calc(78px + env(safe-area-inset-bottom)); padding-top: env(safe-area-inset-top);
    overflow-x: hidden; overscroll-behavior-x: none; overscroll-behavior-y: contain; touch-action: pan-y; width: 100%; }
  .app { max-width: 480px; margin: 0 auto; overflow-x: hidden; width: 100%; min-height: 100vh; min-height: 100dvh; }
  .tape { font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.02em; }
  .display { font-family: 'Fraunces', Georgia, serif; }
  input, select, button { font-family: inherit; }
  input, select { background: var(--surface); color: var(--paper); border: 1px solid rgba(237,234,224,0.15); border-radius: 8px; height: 46px; padding: 0 12px; font-size: 15px; width: 100%; -webkit-appearance: none; appearance: none; }
  input[type="date"] { padding: 0 10px; }
  input[type="checkbox"] { width: 20px; height: 20px; -webkit-appearance: checkbox; appearance: checkbox; accent-color: var(--gold); flex-shrink: 0; }
  input:focus, select:focus, button:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  button { cursor: pointer; }
  .topbar { padding: 18px 20px 14px; border-bottom: 1px solid rgba(237,234,224,0.1); text-align: center; }
  .header { padding: 24px 20px 18px; border-bottom: 1px solid rgba(237,234,224,0.1); }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .nav-btn { background: var(--surface); color: var(--paper); border: none; border-radius: 8px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .month-label { text-align: center; }
  .eyebrow { font-size: 11px; letter-spacing: 0.12em; color: var(--faint); text-transform: uppercase; }
  .total-row { display: flex; align-items: baseline; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .total-num { font-size: 38px; font-weight: 600; }
  .progress-track { height: 6px; background: rgba(237,234,224,0.1); border-radius: 3px; margin-top: 12px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
  .over-warning { margin-top: 12px; display: flex; gap: 6px; align-items: center; color: var(--rust); font-size: 13px; }
  .income-line { display: flex; justify-content: center; gap: 16px; margin-top: 12px; font-size: 12px; color: var(--faint); flex-wrap: wrap; }
  .income-line b { color: var(--paper); font-family: 'IBM Plex Mono', monospace; }
  .tabpanel { padding: 18px 20px; overflow-x: hidden; }
  .section-label { font-size: 12px; letter-spacing: 0.1em; color: var(--faint); text-transform: uppercase; margin-bottom: 10px; }
  .ledger-row { border-bottom: 1px solid rgba(237,234,224,0.08); padding: 10px 0; }
  .legend { display: flex; gap: 12px; margin-bottom: 14px; font-size: 11px; color: var(--faint); flex-wrap: wrap; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .cat-line { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 14px; margin-bottom: 6px; }
  .cat-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; display: flex; align-items: center; gap: 5px; }
  .cat-amount { white-space: nowrap; flex-shrink: 0; font-size: 13px; }
  .cat-tag { font-size: 9px; color: var(--blue); border: 1px solid var(--blue); border-radius: 8px; padding: 0 5px; text-transform: uppercase; letter-spacing: .04em; flex-shrink: 0; }
  .scaled-tag { font-size: 9px; color: var(--gold); flex-shrink: 0; }
  .bar-track { height: 4px; background: rgba(237,234,224,0.08); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; }
  .expense-row { display: flex; align-items: center; padding: 9px 0; gap: 10px; }
  .badge { margin-left: 6px; font-size: 10px; color: var(--rust); border: 1px solid var(--rust); border-radius: 10px; padding: 1px 6px; }
  .icon-btn { background: none; border: none; color: var(--faint); padding: 4px; display: flex; align-items: center; }
  form.stack { display: flex; flex-direction: column; gap: 14px; }
  label.field { display: flex; flex-direction: column; gap: 6px; font-size: 13px; color: var(--faint); }
  .checkbox-field { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--paper); }
  .checkbox-field input { width: auto; height: auto; }
  .toggle-row { display: flex; gap: 8px; }
  .toggle-btn { flex: 1; padding: 10px 0; border-radius: 8px; border: 1px solid rgba(237,234,224,0.15); background: transparent; color: var(--paper); font-size: 14px; }
  .toggle-btn.active { border-color: var(--gold); background: rgba(201,162,39,0.15); color: var(--gold); }
  .toggle-btn.active.blue { border-color: var(--blue); background: rgba(111,163,191,0.15); color: var(--blue); }
  .submit-btn { padding: 13px 0; border-radius: 10px; border: none; background: var(--gold); color: var(--ink); font-weight: 600; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid rgba(237,234,224,0.1); display: flex; justify-content: space-around; padding: 8px 4px calc(8px + env(safe-area-inset-bottom)); max-width: 480px; margin: 0 auto; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; color: var(--faint); font-size: 10px; padding: 4px 6px; }
  .nav-item.active { color: var(--gold); }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--surface-light); border-radius: 10px; padding: 12px 14px; min-width: 0; }
  .stat-label { font-size: 11px; color: var(--faint); margin-bottom: 4px; }
  .stat-value { font-size: 17px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .insight { display: flex; gap: 8px; align-items: flex-start; font-size: 13px; margin-bottom: 10px; }
  .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; gap: 8px; flex-wrap: wrap; }
  .empty { color: var(--faint); font-size: 14px; padding: 10px 0; }
  .chart-wrap { position: relative; height: 190px; margin-bottom: 6px; display: flex; align-items: center; justify-content: center; }
  .chart-wrap canvas { display: block; margin: 0 auto; max-width: 190px; max-height: 190px; }
  .chart-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; max-width: 100px; }
  .chart-center .tape { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; max-width: 100px; }
  .fade-in { animation: fadeIn .35s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .tip-card { background: var(--surface-light); border-left: 3px solid var(--gold); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; font-size: 13px; }
  .subtabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .subtab-btn { flex: 1; padding: 8px 0; border-radius: 8px; border: 1px solid rgba(237,234,224,0.15); background: transparent; color: var(--faint); font-size: 13px; }
  .subtab-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,162,39,0.1); }
  .report-month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
</style>

<script>
const ICONS = {

  chevronLeft: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>',

  alert: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  bulb: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"/></svg>',
  copy: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
  lock: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
};

const DEFAULT_CATEGORIES = ["Maistas","Transportas","Namai / Sąskaitos","Pramogos","Sveikata","Drabužiai","Kita"];
const DEFAULT_BUDGETS = {"Maistas":250,"Transportas":80,"Namai / Sąskaitos":300,"Pramogos":60,"Sveikata":40,"Drabužiai":40,"Kita":50};
const DEFAULT_CONFIG = {};
DEFAULT_CATEGORIES.forEach(c => DEFAULT_CONFIG[c] = { type: "expense", essential: true });
const MONTH_NAMES = ["Sausis","Vasaris","Kovas","Balandis","Gegužė","Birželis","Liepa","Rugpjūtis","Rugsėjis","Spalis","Lapkritis","Gruodis"];
const MONTH_GENITIVE = ["sausio","vasario","kovo","balandžio","gegužės","birželio","liepos","rugpjūčio","rugsėjo","spalio","lapkričio","gruodžio"];

const STARTER_MERCHANTS = [
  { keywords: ["MAXIMA"], category: "Maistas" },
  { keywords: ["IKI"], category: "Maistas" },
  { keywords: ["LIDL"], category: "Maistas" },
  { keywords: ["RIMI"], category: "Maistas" },
  { keywords: ["NORFA"], category: "Maistas" },
  { keywords: ["AIBE"], category: "Maistas" },
  { keywords: ["CIRCLE K", "CIRCLEK"], category: "Transportas" },
  { keywords: ["NESTE"], category: "Transportas" },
  { keywords: ["VIADA"], category: "Transportas" },
  { keywords: ["ORLEN"], category: "Transportas" },
  { keywords: ["EMSI"], category: "Transportas" },
  { keywords: ["BOLT"], category: "Transportas" },
  { keywords: ["APOTHEKA"], category: "Sveikata" },
  { keywords: ["EUROVAISTINE"], category: "Sveikata" },
  { keywords: ["GINTARINE VAISTINE", "GINTARINE"], category: "Sveikata" },
  { keywords: ["BENU"], category: "Sveikata" },
  { keywords: ["NETFLIX"], category: "Pramogos" },
  { keywords: ["SPOTIFY"], category: "Pramogos" },
  { keywords: ["HBO", "MAX.COM"], category: "Pramogos" },
  { keywords: ["FORUM CINEMAS", "CINAMON", "MULTIKINO"], category: "Pramogos" },
  { keywords: ["STEAM", "PLAYSTATION"], category: "Pramogos" },
  { keywords: ["TELIA"], category: "Namai / Sąskaitos" },
  { keywords: ["BITE LIETUVA", "UAB BITE"], category: "Namai / Sąskaitos" },
  { keywords: ["TELE2"], category: "Namai / Sąskaitos" },
  { keywords: ["IGNITIS"], category: "Namai / Sąskaitos" },
  { keywords: ["ESO"], category: "Namai / Sąskaitos" },
  { keywords: ["H&M", "ZARA", "RESERVED", "NEW YORKER", "PULL AND BEAR", "BERSHKA"], category: "Drabužiai" },
  { keywords: ["DECATHLON"], category: "Kita" },
  { keywords: ["IKEA", "JYSK", "SENUKAI"], category: "Namai / Sąskaitos" },
];

function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch (_) { return fallback; }
}
function save(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); } catch (_) {} }

function normalizeMerchant(raw) {
  return (raw || "")
    .toUpperCase()
    .replace(/\b(UAB|AB|MB|VSI|VŠĮ|IĮ|ZUAB|IE)\b/g, "")
    .replace(/[^A-ZĄČĘĖĮŠŲŪŽ0-9 ]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}
function suggestCategoryForMerchant(rawDesc) {
  const norm = normalizeMerchant(rawDesc);
  if (state.merchantMap[norm]) return state.merchantMap[norm];
  for (const entry of STARTER_MERCHANTS) {
    if (entry.keywords.some(k => norm.includes(k))) {
      return state.categories.includes(entry.category) ? entry.category : null;
    }
  }
  return null;
}

function budgetStartDay() { return Math.min(28, Math.max(1, Number(state.budgetStartDay) || 1)); }
// Labels a date with the "YYYY-MM" key of the budget-period it falls into
// (a period runs from budgetStartDay of one calendar month to budgetStartDay-1 of the next).
function budgetMonthKeyForDate(dateStr) {
  const startDay = budgetStartDay();
  if (startDay <= 1) return dateStr.slice(0, 7);
  const d = new Date(dateStr + "T00:00:00");
  let y = d.getFullYear(), m = d.getMonth();
  if (d.getDate() < startDay) { m -= 1; if (m < 0) { m = 11; y -= 1; } }
  return `${y}-${String(m+1).padStart(2,"0")}`;
}
function budgetMonthStartDateStr(monthKey, mode) {
  const [y, m] = monthKey.split("-").map(Number);
  if (mode === "calendar" || budgetStartDay() <= 1) return `${y}-${String(m).padStart(2,"0")}-01`;
  const d = new Date(y, m-1, budgetStartDay());
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function matchesMonth(dateStr, monthKey, mode) {
  if (mode === "calendar" || budgetStartDay() <= 1) return dateStr.slice(0,7) === monthKey;
  return budgetMonthKeyForDate(dateStr) === monthKey;
}
function budgetMonthLabel(key) {
  const [y, m] = key.split("-").map(Number);
  const startDay = budgetStartDay();
  const startDate = new Date(y, m-1, startDay);
  const endDate = new Date(y, m, startDay - 1);
  return `${startDate.getDate()} ${MONTH_GENITIVE[startDate.getMonth()]} – ${endDate.getDate()} ${MONTH_GENITIVE[endDate.getMonth()]}`;
}
function periodLabel(key, mode) {
  if (mode === "calendar" || budgetStartDay() <= 1) return monthLabel(key);
  return budgetMonthLabel(key);
}

function currentMonthKey() {
  const d = new Date();
  const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  return budgetMonthKeyForDate(dateStr);
}

let state = {
  expenses: load("expenses", []),
  incomes: load("incomes", []),
  budgets: load("budgets", DEFAULT_BUDGETS),
  categories: load("categories", DEFAULT_CATEGORIES),
  categoryConfig: load("categoryConfig", DEFAULT_CONFIG),
  baseIncome: load("baseIncome", 0),
  gaugeStyle: load("gaugeStyle", "ring"),
  theme: load("theme", "dark"),
  lastExportAt: load("lastExportAt", null),
  recurringTemplates: load("recurringTemplates", []),
  budgetStartDay: load("budgetStartDay", 1),
  savingsBalance: load("savingsBalance", 0),
  savingsGoalMin: load("savingsGoalMin", 0),
  savingsLog: load("savingsLog", []),
  reportDateMode: "budget",
  merchantMap: load("merchantMap", {}),
  importedHashes: load("importedHashes", []),
  importStep: null,
  importRaw: null,
  importMapping: { dateCol: null, amountCol: null, descCol: null, allExpense: false },
  importDrafts: [],
  importFile: null,
  importSkippedInfo: null,
  showHelp: false,
  editingRecurringId: null,
  searchQuery: "",
  categoryFilter: null,
  editingExpenseId: null,
  editingIncomeId: null,
  formError: null,
  appPin: load("appPin", null),
  appLocked: false,
  reportMode: "month",
  reportYear: new Date().getFullYear(),
  reportCursor: null,
  tab: "overview",
  addSubtab: "expense",
  editingCategory: null,
  chart: null,
  trendChart: null,
};
state.categories.forEach(c => { if (!state.categoryConfig[c]) state.categoryConfig[c] = { type: "expense", essential: true }; });
state.reportCursor = currentMonthKey();

function fmt(n) { return (Math.round(n * 100) / 100).toFixed(2).replace(".", ","); }
function escapeHtml(str) {
  return String(str ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}
function sanitizeCategoryName(str) {
  return String(str ?? "").replace(/[<>"'\\]/g, "").trim();
}
function uid() { return Math.random().toString(36).slice(2, 10); }
function monthLabel(key) { const [y,m] = key.split("-").map(Number); return `${MONTH_NAMES[m-1]} ${y}`; }
function shiftedMonthKey(key, delta) { const [y,m] = key.split("-").map(Number); const d = new Date(y, m-1+delta, 1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; }
function catType(c) { return (state.categoryConfig[c] && state.categoryConfig[c].type) || "expense"; }
function isEssential(c) { const cfg = state.categoryConfig[c]; return !cfg || cfg.essential !== false; }

function persistAll() {
  save("expenses", state.expenses);
  save("incomes", state.incomes);
  save("budgets", state.budgets);
  save("categories", state.categories);
  save("categoryConfig", state.categoryConfig);
  save("baseIncome", state.baseIncome);
  save("gaugeStyle", state.gaugeStyle);
  save("theme", state.theme);
  save("lastExportAt", state.lastExportAt);
  save("recurringTemplates", state.recurringTemplates);
  save("budgetStartDay", state.budgetStartDay);

function incomeForMonth(monthKey, mode) {
  return state.incomes.filter(i => matchesMonth(i.date, monthKey, mode)).reduce((s,i) => s + Number(i.amount), 0);
}
function scaleFactorForMonth(monthKey, mode) {
  if (!state.baseIncome || state.baseIncome <= 0) return 1;
  const inc = incomeForMonth(monthKey, mode || "budget");
  if (inc <= 0) return 1;
  return inc / state.baseIncome;
}
function effectiveBudget(c, monthKey, mode) {
  const base = Number(state.budgets[c]) || 0;
  if (isEssential(c)) return base;
  return base * scaleFactorForMonth(monthKey, mode);
}

function monthData(monthKey, mode) {
  mode = mode || "budget";
  const expenses = state.expenses.filter(e => matchesMonth(e.date, monthKey, mode)).sort((a,b) => b.date.localeCompare(a.date));
  const incomes = state.incomes.filter(i => matchesMonth(i.date, monthKey, mode));
  const budgetExpenses = expenses.filter(e => !e.fromSavings);
  const savingsExpenses = expenses.filter(e => e.fromSavings);
  const savingsSpent = savingsExpenses.reduce((s,e) => s + Number(e.amount), 0);
  const byCategory = {};
  state.categories.forEach(c => byCategory[c] = 0);
  budgetExpenses.forEach(e => byCategory[e.category] = (byCategory[e.category]||0) + Number(e.amount));

  const incomeTotal = incomes.reduce((s,i) => s + Number(i.amount), 0);
  let spentTotal = 0, investedTotal = 0, loanPaidTotal = 0;
  state.categories.forEach(c => {
    const t = catType(c);
    if (t === "investment") investedTotal += byCategory[c] || 0;
    else if (t === "loan") loanPaidTotal += byCategory[c] || 0;
    else spentTotal += byCategory[c] || 0;
  });
  const expenseCats = state.categories.filter(c => catType(c) === "expense");
  const budgetTotal = expenseCats.reduce((s,c) => s + effectiveBudget(c, monthKey, mode), 0);
  const unnecessarySpent = budgetExpenses.filter(e => e.necessity === "nereikalinga").reduce((s,e) => s + Number(e.amount), 0);
  const overCategories = expenseCats.filter(c => (byCategory[c]||0) > effectiveBudget(c, monthKey, mode) && effectiveBudget(c, monthKey, mode) > 0);

  function investTarget(c) {
    const cfg = state.categoryConfig[c] || {};
    if (cfg.goalType === "percent") return incomeTotal * (Number(cfg.goalPercent)||0) / 100;
    return Number(state.budgets[c]) || 0;
  }
  const underInvested = state.categories.filter(c => catType(c) === "investment" && (byCategory[c]||0) < investTarget(c) * 0.999 && investTarget(c) > 0);
  const hasData = expenses.length > 0 || incomes.length > 0;

  return { expenses, incomes, byCategory, incomeTotal, spentTotal, investedTotal, loanPaidTotal, budgetTotal, unnecessarySpent, overCategories, investTarget, underInvested, hasData, savingsSpent };
}

function monthHasData(monthKey, mode) { const d = monthData(monthKey, mode); return d.hasData; }
function findMonthWithData(fromKey, delta, mode) {
  let key = fromKey;
  const cap = currentMonthKey();
  for (let i = 0; i < 36; i++) {
    key = shiftedMonthKey(key, delta);
    if (delta > 0 && key > cap) return null;
    if (monthHasData(key, mode)) return key;
  }
  return null;
}

function statusColorExpense(spent, budget) {

// ---- CSV import ----
function parseCSV(text) {
  const firstLine = text.split("\n")[0];
  const delim = (firstLine.split(";").length > firstLine.split(",").length) ? ";" : (firstLine.split("\t").length > firstLine.split(",").length ? "\t" : ",");
  const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
  const rows = lines.map(line => {
    const out = []; let cur = ""; let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQuotes = !inQuotes; continue; }
      if (ch === delim && !inQuotes) { out.push(cur); cur = ""; continue; }
      cur += ch;
    }
    out.push(cur);
    return out.map(s => s.trim().replace(/^"|"$/g, ""));
  });
  return rows;
}
function looksMojibake(text) {
  // Windows-1257/ISO-8859-13 read as UTF-8 (or vice versa) produces replacement chars or odd sequences
  return /\uFFFD/.test(text) || /[ÃÂ][€ž©®°]/.test(text);
}
function findHeaderRowIndex(rows) {
  // Some LT bank exports have a few summary/metadata lines before the real header.
  // Heuristic: the header row is the first row with >=3 columns where a later row of similar column count follows.
  for (let i = 0; i < Math.min(rows.length - 1, 15); i++) {
    if (rows[i].length >= 3 && rows[i+1] && rows[i+1].length === rows[i].length) return i;
  }
  return 0;
}
function guessColumn(headers, keywords, excludeKeywords) {
  const lower = headers.map(h => h.toLowerCase());
  for (let i = 0; i < lower.length; i++) {
    if (excludeKeywords && excludeKeywords.some(k => lower[i].includes(k))) continue;
    if (keywords.some(k => lower[i].includes(k))) return i;
  }
  return null;
}
function parseFlexibleDate(raw) {
  const s = (raw || "").trim();
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return `${m[1]}-${m[2]}-${m[3]}`;
  m = s.match(/^(\d{1,2})[.\/](\d{1,2})[.\/](\d{4})/);
  if (m) return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
  return null;
}
function parseFlexibleAmount(raw) {
  let s = (raw || "").trim().replace(/\s/g, "").replace(/€/g, "");
  if (s.includes(",") && s.includes(".")) s = s.replace(/\./g, "").replace(",", ".");
  else if (s.includes(",")) s = s.replace(",", ".");
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}
function hashRow(date, amount, desc) { return `${date}|${amount}|${(desc||"").slice(0,40)}`; }

function processCsvText(text) {
  const allRows = parseCSV(text);
  const headerIdx = findHeaderRowIndex(allRows);
  const headers = allRows[headerIdx];
  const dataRows = allRows.slice(headerIdx + 1);
  if (dataRows.length === 0) { alert("Faile nerasta duomenų eilučių."); return; }
  state.importRaw = { headers, dataRows, skippedRows: headerIdx };
  state.importMapping = {
    dateCol: guessColumn(headers, ["data", "date"]),
    amountCol: guessColumn(headers, ["suma", "amount", "value"], ["likutis", "balance"]),
    descCol: guessColumn(headers, ["gavėjas", "gavejas", "aprašymas", "aprasymas", "description", "payee", "detalės", "detales", "mokėjimo paskirtis", "paskirtis"]),
    currencyCol: guessColumn(headers, ["valiuta", "currency", "ccy"]),
    statusCol: guessColumn(headers, ["state", "statusas", "būsena", "busena"]),
    allExpense: false,
  };
  state.importStep = "mapping";
  render();
}
function handleCsvFile(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  state.importFile = file;
  const reader = new FileReader();
  reader.onload = (e) => processCsvText(e.target.result);
  reader.readAsText(file, "UTF-8");
}
function reReadWithEncoding(encoding) {
  if (!state.importFile) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const decoder = new TextDecoder(encoding);
    const text = decoder.decode(new Uint8Array(e.target.result));
    processCsvText(text);
  };
  reader.readAsArrayBuffer(state.importFile);
}
function updateImportMapping(field, val) {
  const numericFields = ["dateCol","amountCol","descCol","currencyCol","statusCol"];
  state.importMapping[field] = field === "allExpense" ? val : (numericFields.includes(field) ? (val === "" ? null : Number(val)) : val);
  render();
}
function proceedToReview() {
  const { headers, dataRows } = state.importRaw;
  const { dateCol, amountCol, descCol, currencyCol, statusCol, allExpense } = state.importMapping;
  if (dateCol === null || amountCol === null) { alert("Pasirink bent datos ir sumos stulpelius."); return; }
  const drafts = [];
  let skippedCurrency = 0, skippedStatus = 0;
  dataRows.forEach((row) => {
    if (currencyCol !== null) {
      const cur = (row[currencyCol] || "").toUpperCase().trim();
      if (cur && cur !== "EUR") { skippedCurrency++; return; }
    }
    if (statusCol !== null) {
      const st = (row[statusCol] || "").toUpperCase();
      if (st && /(PENDING|REVERTED|DECLINED|FAILED|LAUKIAMA|ATMEST)/.test(st)) { skippedStatus++; return; }
    }
    const rawDate = row[dateCol], rawAmount = row[amountCol], rawDesc = descCol !== null ? row[descCol] : "";
    const date = parseFlexibleDate(rawDate);
    const amount = parseFlexibleAmount(rawAmount);
    if (!date || amount === null || amount === 0) return;
    const isIncome = !allExpense && amount > 0;
    const absAmount = Math.abs(amount);
    const suggested = suggestCategoryForMerchant(rawDesc) || state.categories[0];
    const h = hashRow(date, absAmount, rawDesc);
    drafts.push({
      id: uid(), date, amount: absAmount, rawDesc: rawDesc || "", kind: isIncome ? "income" : "expense",
      category: suggested, necessity: "reikalinga", include: !state.importedHashes.includes(h), duplicate: state.importedHashes.includes(h), hash: h,
    });
  });
  if (drafts.length === 0) { alert("Nepavyko atpažinti nė vieno įrašo. Patikrink stulpelių pasirinkimą."); return; }
  state.importSkippedInfo = (skippedCurrency || skippedStatus)
    ? `Praleista: ${skippedCurrency ? `${skippedCurrency} ne-EUR eilučių` : ""}${skippedCurrency && skippedStatus ? ", " : ""}${skippedStatus ? `${skippedStatus} neįvykdytų/laukiančių operacijų` : ""}.`
    : null;
  state.importDrafts = drafts;
  state.importStep = "review";
  render();
}

function buildTips(monthKey, mode) {
  const cur = monthData(monthKey, mode);
  const prevKey = shiftedMonthKey(monthKey, -1);
  const prev = monthData(prevKey, mode);
  const tips = [];

  if (cur.incomeTotal > 0) {
    const spendPct = Math.round((cur.spentTotal / cur.incomeTotal) * 100);
    if (spendPct > 90) tips.push({ tone:"warn", text:`Šį mėnesį išleidai ${spendPct}% savo pajamų — liko labai mažai atsargai.` });
    else if (spendPct < 60) tips.push({ tone:"ok", text:`Išleidai tik ${spendPct}% pajamų — gera atsarga liko.` });
  }

  const investCats = state.categories.filter(c => catType(c) === "investment");
  if (investCats.length && cur.incomeTotal > 0) {
    const investPct = Math.round((cur.investedTotal / cur.incomeTotal) * 100);
    if (investPct < 10) tips.push({ tone:"warn", text:`Investavai tik ${investPct}% pajamų šį mėnesį. Dažna rekomendacija — bent 15–20%.` });
    else tips.push({ tone:"ok", text:`Investavai ${investPct}% savo pajamų — puikus rodiklis, tęsk taip.` });
  }
  cur.underInvested.forEach(c => {
    const target = cur.investTarget(c);
    tips.push({ tone:"warn", text:`„${c}“ tikslas neįvykdytas: investuota €${fmt(cur.byCategory[c]||0)} iš €${fmt(target)}.` });
  });

  state.categories.filter(c => catType(c) !== "investment").forEach(c => {
    const curV = cur.byCategory[c] || 0, prevV = prev.byCategory[c] || 0;
    if (prevV > 5 && curV > prevV * 1.3) {
      const diff = Math.round(((curV - prevV) / prevV) * 100);
      tips.push({ tone:"warn", text:`„${c}“ išlaidos išaugo ${diff}% lyginant su ${monthLabel(prevKey)}.` });
    }
  });

  if (cur.spentTotal > 0 && cur.unnecessarySpent / cur.spentTotal > 0.3) {
    tips.push({ tone:"warn", text:`Beveik trečdalis išlaidų pažymėta kaip „nereikalinga“ — čia daugiausiai vietos taupymui.` });
  }
  if (cur.overCategories.length === 0 && cur.expenses.length > 0) {
    tips.push({ tone:"ok", text:"Visos kategorijos telpa į biudžetą — tvarkingai einasi." });
  }

  if (cur.expenses.length > 0) {
    const biggest = [...cur.expenses].sort((a,b) => b.amount - a.amount)[0];
    tips.push({ tone:"neutral", text:`Didžiausia šio mėnesio išlaida: €${fmt(biggest.amount)} (${escapeHtml(biggest.category)}).` });
  }

  if (monthKey === currentMonthKey() && cur.budgetTotal > 0) {
    const today = new Date();
    const dayOfMonth = today.getDate();
    const daysInMonth = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
    if (dayOfMonth >= 3) {
      const projected = (cur.spentTotal / dayOfMonth) * daysInMonth;
      if (projected > cur.budgetTotal * 1.05) {
        tips.push({ tone:"warn", text:`Šiuo tempu iki mėnesio pabaigos gali išleisti apie €${fmt(projected)} — tai daugiau nei biudžetas (€${fmt(cur.budgetTotal)}).` });
      } else if (projected < cur.budgetTotal * 0.8) {
        tips.push({ tone:"ok", text:`Šiuo tempu iki mėnesio pabaigos turėtum išleisti apie €${fmt(projected)} — gerokai mažiau nei biudžetas.` });
      }
    }
  }

  if (cur.incomeTotal === 0 && cur.expenses.length > 0) {
    tips.push({ tone:"neutral", text:"Šį mėnesį dar neįrašei jokių pajamų — pridėk, kad matytum tikslesnę biudžeto koreliaciją." });
  }

  if (cur.expenses.length >= 5) {
    const isWeekend = (dateStr) => { const day = new Date(dateStr).getDay(); return day === 0 || day === 6; };
    const weekendTotal = cur.expenses.filter(e => isWeekend(e.date)).reduce((s,e) => s + Number(e.amount), 0);
    const allTotal = cur.expenses.reduce((s,e) => s + Number(e.amount), 0);
    if (allTotal > 0 && weekendTotal / allTotal > 0.5) {
      tips.push({ tone:"neutral", text:`Daugiau nei pusė šio mėnesio išlaidų susikaupė savaitgaliais (€${fmt(weekendTotal)}).` });
    }
  }

  let streak = 0, checkKey = monthKey;
  for (let i = 0; i < 12; i++) {
    const dd = monthData(checkKey);
    if (!dd.hasData) break;
    if (dd.overCategories.length === 0 && (dd.budgetTotal <= 0 || dd.spentTotal <= dd.budgetTotal)) { streak++; checkKey = shiftedMonthKey(checkKey, -1); }
    else break;
  }
  if (streak >= 3) tips.push({ tone:"ok", text:`${streak} mėnesius iš eilės neišeini už biudžeto ribų — puikus pastovumas!` });

  if (state.baseIncome > 0) {
    const factor = scaleFactorForMonth(monthKey, mode);
    if (Math.abs(factor - 1) > 0.02) {
      tips.push({ tone:"neutral", text:`Lanksčios kategorijos šį mėnesį pritaikytos ${Math.round(factor*100)}% nuo įprasto dydžio, nes pajamos skyrėsi nuo bazinio atlyginimo.` });
    }
  }
  if (tips.length === 0) tips.push({ tone:"neutral", text:"Kai turėsi daugiau duomenų per kelis mėnesius, čia atsiras asmeniniai pastebėjimai." });
  return tips;
}

function allTimePaidForCategory(c) {
  return state.expenses.filter(e => e.category === c).reduce((s,e) => s + Number(e.amount), 0);
}
function loanTotalFor(c) { return (state.categoryConfig[c] && Number(state.categoryConfig[c].loanTotal)) || 0; }
function loanRemaining(c) { return Math.max(0, loanTotalFor(c) - allTimePaidForCategory(c)); }

function catRow(c, monthKey, d, mode, clickable) {
  const spent = d.byCategory[c]||0;
  const type = catType(c);
  const isInv = type === "investment";
  const isLoan = type === "loan";
  let color, pct, amountLabel;
  if (isInv) {
    const target = d.investTarget(c);
    color = statusColorInvestment(spent, target);
    pct = target > 0 ? Math.min(100, (spent/target)*100) : (spent>0?100:0);
    amountLabel = target > 0 ? `€${fmt(spent)} iš €${fmt(target)}` : `€${fmt(spent)}`;
  } else if (isLoan) {
    const total = loanTotalFor(c);
    const paid = allTimePaidForCategory(c);
    const remaining = loanRemaining(c);
    color = "var(--blue)";
    pct = total > 0 ? Math.min(100, (paid/total)*100) : 0;
    amountLabel = total > 0 ? `liko €${fmt(remaining)} iš €${fmt(total)}` : `sumokėta €${fmt(paid)}`;
  } else {
    const budget = effectiveBudget(c, monthKey, mode);
    color = statusColorExpense(spent, budget);
    pct = budget > 0 ? Math.min(100,(spent/budget)*100) : (spent>0?100:0);
    amountLabel = `€${fmt(spent)}${budget>0?` / €${fmt(budget)}`:""}`;
  }
  const scaled = !isInv && !isLoan && !isEssential(c) && state.baseIncome > 0 && Math.abs(scaleFactorForMonth(monthKey, mode)-1) > 0.02;
  const isActive = state.categoryFilter === c;
  const clickAttr = clickable ? `onclick="toggleCategoryFilter('${c}')" style="cursor:pointer;${isActive?'background:rgba(201,162,39,0.08);border-radius:8px;':''}"` : "";
  return `<div class="ledger-row" ${clickAttr}>
    <div class="cat-line">
      <span class="cat-name"><span>${catEmoji(c)}${c}</span>${isInv?`<span class="cat-tag">Investicija</span>`:""}${isLoan?`<span class="cat-tag" style="color:var(--blue);border-color:var(--blue);">Paskola</span>`:""}${scaled?`<span class="scaled-tag">~pritaikyta</span>`:""}</span>
      <span class="tape cat-amount" style="color:${color}">${amountLabel}</span>
    </div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}
function toggleCategoryFilter(c) {
  state.categoryFilter = state.categoryFilter === c ? null : c;
  render();
}

function overallGaugeColor(remaining, budget) {
  if (budget <= 0) return "#8FA098";
  if (remaining <= 0) return "#D97742";
  const remPct = remaining / budget;
  return remPct > 0.3 ? "#6FBF73" : "#C9A227";
}

function hexToRgb(hex) { const n = parseInt(hex.slice(1), 16); return { r: (n>>16)&255, g: (n>>8)&255, b: n&255 }; }
function lerpColor(c1, c2, t) {
  const p1 = hexToRgb(c1), p2 = hexToRgb(c2);
  const r = Math.round(p1.r + (p2.r - p1.r) * t);
  const g = Math.round(p1.g + (p2.g - p1.g) * t);
  const b = Math.round(p1.b + (p2.b - p1.b) * t);
  return `rgb(${r},${g},${b})`;
}
function gaugeColorAt(p) {
  if (p <= 0.35) return lerpColor("#D97742", "#C9A227", p / 0.35);
  return lerpColor("#C9A227", "#6FBF73", (p - 0.35) / 0.65);
}

function fuelGaugeSVG(remaining, budget) {
  const remPct = budget > 0 ? Math.max(0, Math.min(1, remaining / budget)) : 0;
  const needleColor = overallGaugeColor(remaining, budget);
  const cx = 120, cy = 96, r = 74, needleLen = 58;
  function pointAt(p, radius) {
    const angle = (180 - p * 180) * Math.PI / 180;
    return [cx + radius * Math.cos(angle), cy - radius * Math.sin(angle)];
  }
  function arcPath(p0, p1, radius) {
    const [x0, y0] = pointAt(p0, radius), [x1, y1] = pointAt(p1, radius);
    return `M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${radius} ${radius} 0 0 1 ${x1.toFixed(2)} ${y1.toFixed(2)}`;
  }
  const segments = 36;
  let arcs = "";
  for (let i = 0; i < segments; i++) {
    const p0 = i / segments, p1 = (i + 1) / segments;
    const color = gaugeColorAt((p0 + p1) / 2);
    arcs += `<path d="${arcPath(p0, p1, r)}" stroke="${color}" stroke-width="14" fill="none" stroke-linecap="round"/>`;
  }
  const [nx, ny] = pointAt(remPct, needleLen);
  return `<svg viewBox="0 0 240 130" style="width:100%;max-width:280px;display:block;margin:0 auto;">
    ${arcs}
    <text x="24" y="${cy+20}" fill="#D97742" font-size="16" font-weight="700" font-family="'IBM Plex Mono',monospace">E</text>
    <text x="216" y="${cy+20}" fill="#6FBF73" font-size="16" font-weight="700" font-family="'IBM Plex Mono',monospace" text-anchor="end">F</text>
    <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(2)}" y2="${ny.toFixed(2)}" stroke="${needleColor}" stroke-width="4" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="6" fill="${needleColor}"/>
  </svg>`;
}

function drawChart() {
  const canvas = document.getElementById("pieChart");
  if (!canvas || typeof Chart === "undefined") return;
  const monthKey = currentMonthKey();
  const d = monthData(monthKey, "budget");
  const budget = d.budgetTotal, spent = d.spentTotal;
  const totalEl = document.getElementById("chartTotal");
  if (totalEl) totalEl.textContent = "€" + fmt(spent);
  if (state.chart) { state.chart.destroy(); state.chart = null; }

  if (budget <= 0 && spent <= 0) {
    canvas.parentElement.innerHTML = `<div style="height:160px;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:13px;background:var(--surface);border-radius:12px;">Kai nustatysi biudžetą ir pridėsi išlaidų, čia atsiras indikatorius.</div>`;
    return;
  }

  const remaining = Math.max(budget - spent, 0);
  const over = spent > budget && budget > 0;
  const color = overallGaugeColor(remaining, budget);
  const track = "rgba(237,234,224,0.08)";
  let dataVals, dataColors;
  if (budget <= 0) { dataVals = [1]; dataColors = [track]; }
  else if (over) { dataVals = [1]; dataColors = [color]; }
  else { dataVals = [remaining, spent]; dataColors = [color, track]; }

  state.chart = new Chart(canvas, {
    type: "doughnut",
    data: { datasets: [{ data: dataVals, backgroundColor: dataColors, borderWidth: 0 }] },
    options: { cutout: "68%", plugins: { legend: { display: false }, tooltip: { enabled: false } } }
  });
}

  if (!isExpense || editingIncome) {

    return `<div class="topbar"><div class="eyebrow">${inc?"Redaguoti pajamas":"Naujas įrašas"}</div></div>

        <label class="field">Pavadinimas<input id="i_label" type="text" placeholder="pvz. Atlyginimas, Avansas, Priedas" list="income_labels" value="${inc?escapeHtml(inc.label):''}" /></label>
          <datalist id="income_labels"><option value="Atlyginimas"><option value="Avansas"><option value="Priedas"><option value="Kitos pajamos"></datalist>

          <button type="submit" class="submit-btn" style="background:var(--green);">${inc?ICONS.check:ICONS.plus} ${inc?"Išsaugoti":"Įrašyti pajamas"}</button>
          ${inc?`<button type="button" class="submit-btn" style="background:var(--surface-light);color:var(--paper);flex:0 0 auto;padding:0 18px;" onclick="cancelEdit()">Atšaukti</button>`:""}

    <form class="stack" onsubmit="return submitAdd(event)">
      <label class="field">Suma (€)<input id="f_amount" type="text" inputmode="decimal" placeholder="0,00" value="${exp?String(exp.amount).replace('.', ','):''}" /></label>
      <label class="field">Kategorija<select id="f_category">${state.categories.map(c=>`<option value="${c}" ${exp&&exp.category===c?'selected':''}>${c}${catType(c)==='investment'?' (investicija)':''}</option>`).join("")}</select></label>
      <label class="field">Data<input id="f_date" type="date" value="${exp?exp.date:new Date().toISOString().slice(0,10)}" /></label>
      <label class="field">Pastaba (nebūtina)<input id="f_note" type="text" placeholder="pvz. kavinė su draugais" value="${exp?escapeHtml(exp.note||''):''}" /></label>
      <label class="field">Ar ši išlaida būtina?
        <div class="toggle-row">
          <button type="button" class="toggle-btn ${!exp||exp.necessity==='reikalinga'?'active':''}" id="btn_need" onclick="setNecessity('reikalinga')">Reikalinga</button>
          <button type="button" class="toggle-btn ${exp&&exp.necessity==='nereikalinga'?'active':''}" id="btn_noneed" onclick="setNecessity('nereikalinga')">Nereikalinga</button>

      <div id="f_event_wrap" style="display:${exp&&exp.fromSavings?'block':'none'};">
        <label class="field">Kelionės/įvykio pavadinimas (nebūtina)<input id="f_event" type="text" placeholder="pvz. Kelionė į Ispaniją" value="${exp?escapeHtml(exp.event||''):''}" /></label>
      </div>

function cancelEdit() {
  state.editingExpenseId = null; state.editingIncomeId = null; state.formError = null;
  state.tab = "overview"; render();
}
function editExpense(id) {
  state.editingExpenseId = id; state.editingIncomeId = null; state.formError = null;
  state.addSubtab = "expense"; state.tab = "add"; render();
}
function editIncome(id) {
  state.editingIncomeId = id; state.editingExpenseId = null; state.formError = null;
  state.addSubtab = "income"; state.tab = "add"; render();
}
function duplicateExpense(id) {
  const src = state.expenses.find(e => e.id === id);
  if (!src) return;
  if (src.fromSavings) state.savingsBalance -= Number(src.amount);
  state.expenses.unshift({ ...src, id: uid(), date: new Date().toISOString().slice(0,10), recurringId: undefined });
  persistAll(); render();
  showToast("Įrašas nukopijuotas su šiandienos data");
}
function setNecessity(val) {
  document.getElementById("f_necessity").value = val;
  document.getElementById("btn_need").classList.toggle("active", val === "reikalinga");
  document.getElementById("btn_noneed").classList.toggle("active", val === "nereikalinga");
}
function submitAdd(ev) {
  ev.preventDefault();
  const amountRaw = document.getElementById("f_amount").value;
  const amount = parseFloat(amountRaw.replace(",", "."));
  if (!amountRaw.trim() || isNaN(amount) || amount <= 0) {
    state.formError = "Įvesk teisingą sumą (didesnę už 0)."; render(); return false;
  }
  const date = document.getElementById("f_date").value;
  if (!date) { state.formError = "Pasirink datą."; render(); return false; }
  const fromSavings = document.getElementById("f_fromsavings").checked;
  const event = fromSavings ? document.getElementById("f_event").value.trim() : "";
  const fields = {
    amount, category: document.getElementById("f_category").value,
    date, note: document.getElementById("f_note").value.trim(),
    necessity: document.getElementById("f_necessity").value,
    fromSavings, event,
  };
  if (state.editingExpenseId) {
    const idx = state.expenses.findIndex(e => e.id === state.editingExpenseId);
    if (idx !== -1) {
      const old = state.expenses[idx];
      if (old.fromSavings) state.savingsBalance += Number(old.amount);
      if (fromSavings) state.savingsBalance -= amount;
      state.expenses[idx] = { ...old, ...fields };
    }
    state.editingExpenseId = null;
    showToast("Išlaida atnaujinta");
  } else {
    if (fromSavings) state.savingsBalance -= amount;
    state.expenses.unshift({ id: uid(), ...fields });
    showToast(fromSavings ? "Išlaida įrašyta iš santaupų" : "Išlaida įrašyta");
  }
  state.formError = null;
  const entryMonth = budgetMonthKeyForDate(date);
  state.reportCursor = entryMonth;
  state.tab = entryMonth === currentMonthKey() ? "overview" : "report";
  persistAll(); render();
  return false;
}
function submitIncome(ev) {
  ev.preventDefault();
  const amountRaw = document.getElementById("i_amount").value;
  const amount = parseFloat(amountRaw.replace(",", "."));
  if (!amountRaw.trim() || isNaN(amount) || amount <= 0) {
    state.formError = "Įvesk teisingą sumą (didesnę už 0)."; render(); return false;
  }
  const date = document.getElementById("i_date").value;
  if (!date) { state.formError = "Pasirink datą."; render(); return false; }
  const fields = { amount, label: document.getElementById("i_label").value.trim() || "Pajamos", date };
  if (state.editingIncomeId) {
    const idx = state.incomes.findIndex(i => i.id === state.editingIncomeId);
    if (idx !== -1) state.incomes[idx] = { ...state.incomes[idx], ...fields };
    state.editingIncomeId = null;
    showToast("Pajamos atnaujintos");
  } else {
    state.incomes.unshift({ id: uid(), ...fields });
    showToast("Pajamos įrašytos");
  }
  state.formError = null;
  const entryMonth = budgetMonthKeyForDate(date);
  state.reportCursor = entryMonth;
  state.tab = entryMonth === currentMonthKey() ? "overview" : "report";
  persistAll(); render();
  return false;
}

function renderReport() {
  const toggle = `<div class="toggle-row" style="margin-bottom:16px;">
    <button type="button" class="toggle-btn ${state.reportMode!=='year'?'active':''}" onclick="state.reportMode='month';render();">Mėnuo</button>
    <button type="button" class="toggle-btn ${state.reportMode==='year'?'active':''}" onclick="state.reportMode='year';render();">Metai</button>
  </div>`;
  if (state.reportMode === "year") return `<div class="tabpanel fade-in">${toggle}${renderYearlyReport()}</div>`;
  return `<div class="tabpanel fade-in">${toggle}${renderMonthlyReport()}</div>`;
}

function yearData(year) {
  let incomeTotal = 0, spentTotal = 0, investedTotal = 0;
  const monthly = [];
  const monthlyFull = [];
  for (let m = 1; m <= 12; m++) {
    const key = `${year}-${String(m).padStart(2,"0")}`;
    const d = monthData(key, "calendar");
    incomeTotal += d.incomeTotal; spentTotal += d.spentTotal; investedTotal += d.investedTotal;
    monthlyFull.push({ key, incomeTotal: d.incomeTotal, spentTotal: d.spentTotal, investedTotal: d.investedTotal });
    if (d.hasData) monthly.push({ key, incomeTotal: d.incomeTotal, spentTotal: d.spentTotal, investedTotal: d.investedTotal });
  }
  const saved = incomeTotal - spentTotal - investedTotal;
  return { incomeTotal, spentTotal, investedTotal, saved, monthly, monthlyFull };
}

function drawTrendChart(year) {
  const canvas = document.getElementById("trendChart");
  if (!canvas || typeof Chart === "undefined") return;
  const y = yearData(year);
  if (state.trendChart) { state.trendChart.destroy(); state.trendChart = null; }
  const labels = y.monthlyFull.map(m => MONTH_NAMES[Number(m.key.split("-")[1])-1].slice(0,3));
  state.trendChart = new Chart(canvas, {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Pajamos", data: y.monthlyFull.map(m=>m.incomeTotal), borderColor: "#6FBF73", backgroundColor: "transparent", tension: 0.3, pointRadius: 2 },
        { label: "Išleista", data: y.monthlyFull.map(m=>m.spentTotal), borderColor: "#D97742", backgroundColor: "transparent", tension: 0.3, pointRadius: 2 },
        { label: "Investuota", data: y.monthlyFull.map(m=>m.investedTotal), borderColor: "#6FA3BF", backgroundColor: "transparent", tension: 0.3, pointRadius: 2 },
      ]
    },
    options: {
      plugins: { legend: { position: "bottom", labels: { color: "#8FA098", boxWidth: 10, font: { size: 10 } } }, tooltip: { callbacks: { label: (ctx) => ` ${ctx.dataset.label}: €${fmt(ctx.raw)}` } } },
      scales: {
        x: { ticks: { color: "#8FA098", font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: "#8FA098", font: { size: 10 } }, grid: { color: "rgba(237,234,224,0.08)" } },
      }
    }
  });
}

function renderMonthlyReport() {
  const mode = budgetStartDay() > 1 ? state.reportDateMode : "calendar";
  const monthKey = state.reportCursor;
  const d = monthData(monthKey, mode);
  const canGoForward = monthKey < currentMonthKey();
  const dateModeToggle = budgetStartDay() > 1 ? `
    <div class="toggle-row" style="margin-bottom:14px;">
      <button type="button" class="toggle-btn ${mode!=='calendar'?'active blue':''}" onclick="state.reportDateMode='budget';render();">Mano mėnuo</button>
      <button type="button" class="toggle-btn ${mode==='calendar'?'active blue':''}" onclick="state.reportDateMode='calendar';render();">Kalendorinis</button>
    </div>` : "";

  if (!d.hasData) {
    return `${dateModeToggle}
      <div class="report-month-nav">
        <button class="nav-btn" onclick="shiftReportMonth(-1)" aria-label="Ankstesnis mėnesis">${ICONS.chevronLeft}</button>
        <div class="display" style="font-size:17px;font-weight:600;">${periodLabel(monthKey, mode)}</div>
        <button class="nav-btn" style="${canGoForward?'':'opacity:.3;'}" ${canGoForward?'':'disabled'} onclick="shiftReportMonth(1)" aria-label="Kitas mėnesis">${ICONS.chevronRight}</button>
      </div>
      <div class="empty" style="text-align:center;padding:40px 0;">Šiam mėnesiui duomenų nėra.</div>`;
  }

  const sorted = [...state.categories].filter(c=>catType(c)==="expense").sort((a,b) => (d.byCategory[b]||0)-(d.byCategory[a]||0));
  const top3 = sorted.filter(c => d.byCategory[c] > 0).slice(0,3);
  const remaining = d.incomeTotal > 0 ? d.incomeTotal - d.spentTotal - d.investedTotal : d.budgetTotal - d.spentTotal;
  const remainingLabel = d.incomeTotal > 0 ? "Likutis po išlaidų ir investicijų" : (remaining>=0 ? "Likutis" : "Viršyta");
  const necessaryPct = d.spentTotal > 0 ? 100 - (d.unnecessarySpent/d.spentTotal)*100 : 100;
  const tips = buildTips(monthKey, mode);
  const colorFor = t => t === "warn" ? "var(--rust)" : t === "ok" ? "var(--green)" : "var(--faint)";

  return `${dateModeToggle}
    <div class="report-month-nav">
      <button class="nav-btn" onclick="shiftReportMonth(-1)" aria-label="Ankstesnis mėnesis">${ICONS.chevronLeft}</button>
      <div class="display" style="font-size:17px;font-weight:600;">${periodLabel(monthKey, mode)}</div>
      <button class="nav-btn" style="${canGoForward?'':'opacity:.3;'}" ${canGoForward?'':'disabled'} onclick="shiftReportMonth(1)" aria-label="Kitas mėnesis">${ICONS.chevronRight}</button>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Pajamos</div><div class="tape stat-value" style="color:var(--green)">€${fmt(d.incomeTotal)}</div></div>
      <div class="stat-card"><div class="stat-label">Išleista</div><div class="tape stat-value">€${fmt(d.spentTotal)}</div></div>
      <div class="stat-card"><div class="stat-label">Investuota</div><div class="tape stat-value" style="color:var(--blue)">€${fmt(d.investedTotal)}</div></div>
      <div class="stat-card"><div class="stat-label">${remainingLabel}</div><div class="tape stat-value" style="color:${remaining>=0?'var(--green)':'var(--rust)'}">€${fmt(Math.abs(remaining))}</div></div>
      <div class="stat-card"><div class="stat-label">Nereikalinga</div><div class="tape stat-value" style="color:${d.unnecessarySpent>0?'var(--rust)':'var(--faint)'}">€${fmt(d.unnecessarySpent)}</div></div>
      <div class="stat-card"><div class="stat-label">Būtinos išlaidos</div><div class="tape stat-value">${Math.round(necessaryPct)}%</div></div>
    </div>

    <div class="section-label">Patarimai</div>
    ${tips.map(t => `<div class="tip-card" style="border-left-color:${colorFor(t.tone)}"><div style="display:flex;gap:8px;align-items:flex-start;color:${colorFor(t.tone)}">${ICONS.bulb}<span style="color:var(--paper)">${t.text}</span></div></div>`).join("")}

    ${top3.length ? top3.map((c,i)=>`<div class="ledger-row" style="display:flex;justify-content:space-between;padding:8px 0;font-size:14px;"><span>${i+1}. ${c}</span><span class="tape">€${fmt(d.byCategory[c])}</span></div>`).join("") : `<div class="empty">Nėra duomenų šiam mėnesiui.</div>`}`;
}

function promptSetPin() {
  const pin = prompt("Sugalvok 4 skaitmenų PIN kodą programėlei atrakinti:");
  if (!pin) return;
  if (!/^\d{4}$/.test(pin)) { alert("PIN turi būti iš tiksliai 4 skaitmenų."); return; }
  state.appPin = pin;
  persistAll(); render();
  showToast("PIN kodas nustatytas");
}
function disableAppPin() {
  if (!confirm("Išjungti programėlės užraktą?")) return;
  state.appPin = null;
  persistAll(); render();
}

function updateBudgetStartDay(val) {
  const n = Math.min(28, Math.max(1, parseInt(val, 10) || 1));
  state.budgetStartDay = n;
  state.reportCursor = currentMonthKey();

function setGaugeStyle(style) { state.gaugeStyle = style; persistAll(); render(); }
function daysSinceExport() {
  if (!state.lastExportAt) return null;
  return Math.floor((Date.now() - new Date(state.lastExportAt).getTime()) / 86400000);
}
function exportData() {
  const payload = {
    expenses: state.expenses, incomes: state.incomes, budgets: state.budgets,
    categories: state.categories, categoryConfig: state.categoryConfig,
    baseIncome: state.baseIncome, gaugeStyle: state.gaugeStyle, theme: state.theme,
    recurringTemplates: state.recurringTemplates, budgetStartDay: state.budgetStartDay,
    merchantMap: state.merchantMap, importedHashes: state.importedHashes, savingsBalance: state.savingsBalance, exportedAt: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `biudzetas-atsarga-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  state.lastExportAt = new Date().toISOString();
  persistAll(); render();
}
function importDataFile(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.expenses) state.expenses = data.expenses;
      if (data.incomes) state.incomes = data.incomes;
      if (data.budgets) state.budgets = data.budgets;
      if (data.categories) state.categories = data.categories;
      if (data.categoryConfig) state.categoryConfig = data.categoryConfig;
      if (typeof data.baseIncome === "number") state.baseIncome = data.baseIncome;
      if (data.gaugeStyle) state.gaugeStyle = data.gaugeStyle;
      if (data.theme) state.theme = data.theme;
      if (data.recurringTemplates) state.recurringTemplates = data.recurringTemplates;
      if (typeof data.budgetStartDay === "number") state.budgetStartDay = data.budgetStartDay;
      if (data.merchantMap) state.merchantMap = data.merchantMap;
      if (data.importedHashes) state.importedHashes = data.importedHashes;
      if (typeof data.savingsBalance === "number") state.savingsBalance = data.savingsBalance;
      persistAll();
      applyTheme();
      render();
      alert("Duomenys sėkmingai atkurti.");
    } catch (err) {
      alert("Nepavyko nuskaityti failo — patikrink, ar tai teisingas atsarginės kopijos failas.");
    }
  };
  reader.readAsText(file);
}

    ${err}
  </div>`;
}
function submitPin(ev) {
  ev.preventDefault();
  const val = document.getElementById("pin_input").value;
  if (val === state.appPin) {
    state.appLocked = false; state.pinError = null; render();
  } else {
    state.pinError = "Neteisingas PIN kodas."; render();
  }
  return false;
}

function render() {
  const app = document.getElementById("app");
  if (state.appPin && state.appLocked) {
    app.innerHTML = renderLockScreen();
    const pi = document.getElementById("pin_input");
    if (pi) pi.focus();
    return;
  }
  if (state.showHelp) { app.innerHTML = renderHelp(); return; }
  if (state.importStep === "mapping") { app.innerHTML = renderImportMapping(); return; }
  if (state.importStep === "review") { app.innerHTML = renderImportReview(); return; }
  let body = "";
  if (state.tab === "overview") body = renderOverview();
  else if (state.tab === "add") body = renderAdd();
  else if (state.tab === "report") body = renderReport();
  else if (state.tab === "settings") body = renderSettings();

  app.innerHTML = body + `
    <div class="bottom-nav">
      <button class="nav-item ${state.tab==='overview'?'active':''}" onclick="setTab('overview')">${ICONS.wallet}Apžvalga</button>
      <button class="nav-item ${state.tab==='add'?'active':''}" onclick="setTab('add')">${ICONS.plus}Pridėti</button>
      <button class="nav-item ${state.tab==='report'?'active':''}" onclick="setTab('report')">${ICONS.file}Ataskaita</button>
      <button class="nav-item ${state.tab==='settings'?'active':''}" onclick="setTab('settings')">${ICONS.settings}Nustatymai</button>
    </div>`;

  if (state.tab === "overview" && state.gaugeStyle !== "fuel") drawChart();
  if (state.tab === "report" && state.reportMode === "year") drawTrendChart(state.reportYear);
  if (state._focusSearch) {
    const si = document.getElementById("search_input");
    if (si) { si.focus(); const len = si.value.length; si.setSelectionRange(len, len); }
    state._focusSearch = false;
  }
  if (state.tab === "add" && state.addSubtab === "expense" && !state.editingExpenseId) setNecessity("reikalinga");
}
function setTab(t) {
  if (t === "report") state.reportCursor = currentMonthKey();
  state.tab = t;
  render();
}

applyTheme();
applyRecurringTemplates();
if (state.appPin) state.appLocked = true;
render();

document.addEventListener("visibilitychange", () => {
  if (document.hidden && state.appPin) {
    state.appLocked = true;
  }
});

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
