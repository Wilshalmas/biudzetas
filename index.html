  .ledger-row { border-bottom: 1px solid rgba(237,234,224,0.08); padding: 10px 0; }

  .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .cat-line { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 14px; margin-bottom: 6px; }
  .cat-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; display: flex; align-items: center; gap: 5px; }

  .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; gap: 8px; flex-wrap: wrap; }

  .empty { color: var(--faint); font-size: 14px; padding: 10px 0; }

  .settings-collapse { max-height: 0; overflow: hidden; opacity: 0; padding: 0 2px; transition: max-height 0.35s ease, opacity 0.25s ease, margin-bottom 0.35s ease, padding 0.35s ease; }

// --- Storage: IndexedDB-backed (falls back to localStorage if IndexedDB unavailable) ---
// load() stays synchronous and only returns the fallback — real persisted values are
// applied to `state` asynchronously at startup via loadAllFromIDB(), after which every
// subsequent save() writes straight to IndexedDB in the background.
const DB_NAME = "biudzetasDB", DB_STORE = "kv";
let idbAvailable = typeof indexedDB !== "undefined";
let idbInstance = null;
function idbOpen() {
  if (idbInstance) return Promise.resolve(idbInstance);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => { if (!req.result.objectStoreNames.contains(DB_STORE)) req.result.createObjectStore(DB_STORE); };
    req.onsuccess = () => { idbInstance = req.result; resolve(idbInstance); };
    req.onerror = () => reject(req.error);
  });
}
async function idbGetAll() {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readonly");
    const store = tx.objectStore(DB_STORE);
    const keysReq = store.getAllKeys(), valsReq = store.getAll();
    tx.oncomplete = () => {
      const obj = {};
      keysReq.result.forEach((k, i) => obj[k] = valsReq.result[i]);
      resolve(obj);
    };
    tx.onerror = () => reject(tx.error);
  });
}
async function idbSet(key, value) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).put(value, key);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}
async function migrateLocalStorageToIDB() {
  const existing = await idbGetAll();
  if (existing.__migrated__) return;
  const db = await idbOpen();
  await new Promise((resolve) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    const store = tx.objectStore(DB_STORE);
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (!key) continue;
      try { store.put(JSON.parse(localStorage.getItem(key)), key); } catch (_) {}
    }
    store.put(true, "__migrated__");
    tx.oncomplete = resolve; tx.onerror = resolve;
  });
}

function load(key, fallback) { return fallback; }
function save(key, value) {
  if (idbAvailable) {
    idbSet(key, value).catch(() => { try { localStorage.setItem(key, JSON.stringify(value)); } catch (_) {} });
  } else {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (_) {}
  }
}

function normalizeMerchant(raw) {
  return (raw || "")
    .toUpperCase()
    .replace(/\b(UAB|AB|MB|VSI|VŠĮ|IĮ|ZUAB|IE)\b/g, "")
    .replace(/[^A-ZĄČĘĖĮŠŲŪŽ0-9 ]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}
function suggestCategoryForMerchant(rawDesc) {
  const norm = normalizeMerchant(rawDesc);
  if (state.merchantMap[norm]) return state.merchantMap[norm];
  for (const entry of STARTER_MERCHANTS) {

  return null;
}

function budgetStartDay() { return Math.min(28, Math.max(1, Number(state.budgetStartDay) || 1)); }
// Labels a date with the "YYYY-MM" key of the budget-period it falls into
// (a period runs from budgetStartDay of one calendar month to budgetStartDay-1 of the next).
function budgetMonthKeyForDate(dateStr) {
  const startDay = budgetStartDay();
  if (startDay <= 1) return dateStr.slice(0, 7);
  const d = new Date(dateStr + "T00:00:00");
  let y = d.getFullYear(), m = d.getMonth();
  if (d.getDate() < startDay) { m -= 1; if (m < 0) { m = 11; y -= 1; } }
  return `${y}-${String(m+1).padStart(2,"0")}`;
}
function budgetMonthStartDateStr(monthKey, mode) {
  const [y, m] = monthKey.split("-").map(Number);
  if (mode === "calendar" || budgetStartDay() <= 1) return `${y}-${String(m).padStart(2,"0")}-01`;
  const d = new Date(y, m-1, budgetStartDay());
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function matchesMonth(dateStr, monthKey, mode) {
  if (mode === "calendar" || budgetStartDay() <= 1) return dateStr.slice(0,7) === monthKey;
  return budgetMonthKeyForDate(dateStr) === monthKey;
}
function budgetMonthLabel(key) {
  const [y, m] = key.split("-").map(Number);
  const startDay = budgetStartDay();
  const startDate = new Date(y, m-1, startDay);
  const endDate = new Date(y, m, startDay - 1);
  return `${startDate.getDate()} ${MONTH_GENITIVE[startDate.getMonth()]} – ${endDate.getDate()} ${MONTH_GENITIVE[endDate.getMonth()]}`;
}
function periodLabel(key, mode) {
  if (mode === "calendar" || budgetStartDay() <= 1) return monthLabel(key);
  return budgetMonthLabel(key);
}

function periodDateRange(monthKey, mode) {
  const startStr = budgetMonthStartDateStr(monthKey, mode);
  const [sy, sm, sd] = startStr.split("-").map(Number);
  const startDate = new Date(sy, sm-1, sd);
  let endDate;
  if (mode === "calendar" || budgetStartDay() <= 1) {
    endDate = new Date(sy, sm, 0);
  } else {
    const nextStartStr = budgetMonthStartDateStr(shiftedMonthKey(monthKey, 1), mode);
    const [ny, nm, nd] = nextStartStr.split("-").map(Number);
    endDate = new Date(ny, nm-1, nd-1);
  }
  return { startDate, endDate };
}
function periodProgress(monthKey, mode) {
  const { startDate, endDate } = periodDateRange(monthKey, mode);
  const totalDays = Math.round((endDate - startDate) / 86400000) + 1;
  const today = new Date(); today.setHours(0,0,0,0);
  let elapsed = Math.round((today - startDate) / 86400000) + 1;
  elapsed = Math.max(1, Math.min(totalDays, elapsed));
  return { totalDays, elapsed, remaining: totalDays - elapsed };
}
function currentMonthKey() {
  const d = new Date();
  const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  return budgetMonthKeyForDate(dateStr);
}

function incomeForMonth(monthKey, mode) {
  return state.incomes.filter(i => matchesMonth(i.date, monthKey, mode)).reduce((s,i) => s + Number(i.amount), 0);
}
function scaleFactorForMonth(monthKey, mode) {
  if (!state.baseIncome || state.baseIncome <= 0) return 1;
  const inc = incomeForMonth(monthKey, mode || "budget");
  if (inc <= 0) return 1;
  return inc / state.baseIncome;
}
function effectiveBudget(c, monthKey, mode) {
  const base = Number(state.budgets[c]) || 0;
  if (isEssential(c)) return base;
  return base * scaleFactorForMonth(monthKey, mode);
}

function monthData(monthKey, mode) {
  mode = mode || "budget";
  const expenses = state.expenses.filter(e => matchesMonth(e.date, monthKey, mode)).sort((a,b) => b.date.localeCompare(a.date));
  const incomes = state.incomes.filter(i => matchesMonth(i.date, monthKey, mode));
  const budgetExpenses = expenses.filter(e => !e.fromSavings);
  const savingsExpenses = expenses.filter(e => e.fromSavings);
  const savingsSpent = savingsExpenses.reduce((s,e) => s + Number(e.amount), 0);
  const byCategory = {};
  state.categories.forEach(c => byCategory[c] = 0);
  budgetExpenses.forEach(e => byCategory[e.category] = (byCategory[e.category]||0) + Number(e.amount));

  const incomeTotal = incomes.reduce((s,i) => s + Number(i.amount), 0);
  let spentTotal = 0, investedTotal = 0, loanPaidTotal = 0, savingsGoalTotal = 0;
  state.categories.forEach(c => {
    const t = catType(c);
    if (t === "investment") investedTotal += byCategory[c] || 0;
    else if (t === "savingsgoal") savingsGoalTotal += byCategory[c] || 0;
    else {
      spentTotal += byCategory[c] || 0;
      if (t === "loan") loanPaidTotal += byCategory[c] || 0;
    }
  });
  const expenseCats = state.categories.filter(c => catType(c) === "expense");
  const loanCats = state.categories.filter(c => catType(c) === "loan");
  function loanMinPayment(c) { return Number((state.categoryConfig[c]||{}).minPayment) || 0; }
  const budgetTotal = expenseCats.reduce((s,c) => s + effectiveBudget(c, monthKey, mode), 0)
    + loanCats.reduce((s,c) => s + loanMinPayment(c), 0);
  const unnecessarySpent = budgetExpenses.filter(e => e.necessity === "nereikalinga").reduce((s,e) => s + Number(e.amount), 0);
  const overCategories = expenseCats.filter(c => (byCategory[c]||0) > effectiveBudget(c, monthKey, mode) && effectiveBudget(c, monthKey, mode) > 0);
  const nearingCategories = expenseCats.filter(c => {
    const b = effectiveBudget(c, monthKey, mode);
    if (b <= 0) return false;
    const pct = (byCategory[c]||0) / b;
    return pct >= 0.85 && pct <= 1;
  });
  const underpaidLoans = loanCats.filter(c => loanMinPayment(c) > 0 && (byCategory[c]||0) < loanMinPayment(c));

  function investTarget(c) {
    const cfg = state.categoryConfig[c] || {};
    if (cfg.goalType === "percent") return incomeTotal * (Number(cfg.goalPercent)||0) / 100;
    return Number(state.budgets[c]) || 0;
  }
  const underInvested = state.categories.filter(c => (catType(c) === "investment" || catType(c) === "savingsgoal") && (byCategory[c]||0) < investTarget(c) * 0.999 && investTarget(c) > 0);
  const hasData = expenses.length > 0 || incomes.length > 0;

  return { expenses, incomes, byCategory, incomeTotal, spentTotal, investedTotal, loanPaidTotal, savingsGoalTotal, budgetTotal, unnecessarySpent, overCategories, nearingCategories, underpaidLoans, investTarget, underInvested, hasData, savingsSpent, loanMinPayment };
}

function monthHasData(monthKey, mode) { const d = monthData(monthKey, mode); return d.hasData; }
function findMonthWithData(fromKey, delta, mode) {
  let key = fromKey;
  const cap = currentMonthKey();
  for (let i = 0; i < 36; i++) {
    key = shiftedMonthKey(key, delta);
    if (delta > 0 && key > cap) return null;
    if (monthHasData(key, mode)) return key;
  }
  return null;
}

function statusColorExpense(spent, budget) {
  if (!budget || budget <= 0) return spent > 0 ? "var(--gold)" : "var(--faint)";
  const pct = spent / budget;
  if (pct > 1) return "var(--rust)";
  if (pct >= 0.7) return "var(--gold)";
  return "var(--green)";
}
function statusColorInvestment(achieved, target) {
  if (!target || target <= 0) return achieved > 0 ? "var(--green)" : "var(--faint)";
  const pct = achieved / target;
  if (pct >= 1) return "var(--green)";
  if (pct >= 0.5) return "var(--gold)";
  return "var(--rust)";
}
function statusColorLoan(paidThisMonth, minPayment) {
  if (!minPayment || minPayment <= 0) return paidThisMonth > 0 ? "var(--blue)" : "var(--faint)";
  if (paidThisMonth >= minPayment) return "var(--green)";
  if (paidThisMonth > 0) return "var(--gold)";
  return "var(--rust)";
}
function statusColorRaw(color) {
  return { "var(--rust)":"#D97742", "var(--gold)":"#C9A227", "var(--green)":"#6FBF73", "var(--faint)":"#8FA098" }[color] || "#8FA098";
}

function catEmoji(c) {

function shiftReportMonth(delta) {
  const jump = findMonthWithData(state.reportCursor, delta, state.reportDateMode);
  if (jump) { state.reportCursor = jump; render(); return; }
  const next = shiftedMonthKey(state.reportCursor, delta);
  if (delta > 0 && next > currentMonthKey()) return;
  state.reportCursor = next;
  render();
}

function addCategory(name, type, goalType, goalPercent, essential, minPayment) {
  const trimmed = sanitizeCategoryName(name);
  if (!trimmed || state.categories.includes(trimmed)) return;
  state.categories.push(trimmed);
  state.budgets[trimmed] = 0;
  state.categoryConfig[trimmed] = (type === "investment" || type === "savingsgoal")

function parseCSV(text) {
  const firstLine = text.split("\n")[0];
  const delim = (firstLine.split(";").length > firstLine.split(",").length) ? ";" : (firstLine.split("\t").length > firstLine.split(",").length ? "\t" : ",");
  const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
  const rows = lines.map(line => {
    const out = []; let cur = ""; let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQuotes = !inQuotes; continue; }
      if (ch === delim && !inQuotes) { out.push(cur); cur = ""; continue; }
      cur += ch;
    }
    out.push(cur);
    return out.map(s => s.trim().replace(/^"|"$/g, ""));
  });
  return rows;
}
function looksMojibake(text) {
  // Windows-1257/ISO-8859-13 read as UTF-8 (or vice versa) produces replacement chars or odd sequences
  return /\uFFFD/.test(text) || /[ÃÂ][€ž©®°]/.test(text);
}
function findHeaderRowIndex(rows) {
  // Some LT bank exports have a few summary/metadata lines before the real header.
  // Heuristic: the header row is the first row with >=3 columns where a later row of similar column count follows.
  for (let i = 0; i < Math.min(rows.length - 1, 15); i++) {
    if (rows[i].length >= 3 && rows[i+1] && rows[i+1].length === rows[i].length) return i;
  }
  return 0;
}
function guessColumn(headers, keywords, excludeKeywords) {
  const lower = headers.map(h => h.toLowerCase());
  for (let i = 0; i < lower.length; i++) {
    if (excludeKeywords && excludeKeywords.some(k => lower[i].includes(k))) continue;
    if (keywords.some(k => lower[i].includes(k))) return i;
  }
  return null;
}
function parseFlexibleDate(raw) {
  const s = (raw || "").trim();
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return `${m[1]}-${m[2]}-${m[3]}`;
  m = s.match(/^(\d{1,2})[.\/](\d{1,2})[.\/](\d{4})/);
  if (m) return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
  return null;
}
function parseFlexibleAmount(raw) {
  let s = (raw || "").trim().replace(/\s/g, "").replace(/€/g, "");
  if (s.includes(",") && s.includes(".")) s = s.replace(/\./g, "").replace(",", ".");
  else if (s.includes(",")) s = s.replace(",", ".");
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}
function hashRow(date, amount, desc) { return `${date}|${amount}|${(desc||"").slice(0,40)}`; }

function processCsvText(text) {
  try {
    const allRows = parseCSV(text);
    if (!allRows || allRows.length === 0) { alert("Failas tuščias arba nepavyko perskaityti."); return; }
    const headerIdx = findHeaderRowIndex(allRows);
    const headers = allRows[headerIdx];
    const dataRows = allRows.slice(headerIdx + 1);
    if (dataRows.length === 0) { alert("Faile nerasta duomenų eilučių (rasta tik " + allRows.length + " eilutė(-ių) iš viso)."); return; }
    state.importRaw = { headers, dataRows, skippedRows: headerIdx };
    const sig = headers.join("|").toLowerCase();
    const remembered = state.csvMappingMemory[sig];
    state.importMapping = remembered ? { ...remembered } : {
      dateCol: guessColumn(headers, ["data", "date"]),
      amountCol: guessColumn(headers, ["suma", "amount", "value"], ["likutis", "balance"]),
      descCol: guessColumn(headers, ["gavėjas", "gavejas", "aprašymas", "aprasymas", "description", "payee", "detalės", "detales", "mokėjimo paskirtis", "paskirtis"]),
      currencyCol: guessColumn(headers, ["valiuta", "currency", "ccy"]),
      statusCol: guessColumn(headers, ["state", "statusas", "būsena", "busena"]),
      allExpense: false,
    };
    state.importHeaderSig = sig;
    state.importStep = "mapping";
    render();
  } catch (err) {

  }
}
function handleCsvFile(input) {
  const file = input.files && input.files[0];
  if (!file) { alert("Failas nepasirinktas. Patikrink, ar failo pavadinimas tikrai baigiasi .csv (Windows kartais paslepia tikrą plėtinį)."); return; }
  state.importFile = file;
  const reader = new FileReader();
  reader.onload = (e) => processCsvText(e.target.result);
  reader.onerror = () => alert("Nepavyko perskaityti failo: " + reader.error);
  reader.readAsText(file, "UTF-8");
}
function reReadWithEncoding(encoding) {

  const reader = new FileReader();
  reader.onload = (e) => {

    const text = decoder.decode(new Uint8Array(e.target.result));
    processCsvText(text);
  };
  reader.readAsArrayBuffer(state.importFile);
}
function updateImportMapping(field, val) {

  state.importMapping[field] = field === "allExpense" ? val : (numericFields.includes(field) ? (val === "" ? null : Number(val)) : val);
  render();
}
function proceedToReview() {
  try {
    const { headers, dataRows } = state.importRaw;
    const { dateCol, amountCol, descCol, currencyCol, statusCol, allExpense } = state.importMapping;
    if (dateCol === null || amountCol === null) { alert("Pasirink bent datos ir sumos stulpelius."); return; }
    if (state.importHeaderSig) {
      state.csvMappingMemory[state.importHeaderSig] = { dateCol, amountCol, descCol, currencyCol, statusCol, allExpense };
      save("csvMappingMemory", state.csvMappingMemory);
    }
    const drafts = [];
    let skippedCurrency = 0, skippedStatus = 0;
    dataRows.forEach((row) => {
      if (currencyCol !== null) {
        const cur = (row[currencyCol] || "").toUpperCase().trim();
        if (cur && cur !== "EUR") { skippedCurrency++; return; }
      }
      if (statusCol !== null) {
        const st = (row[statusCol] || "").toUpperCase();
        if (st && /(PENDING|REVERTED|DECLINED|FAILED|LAUKIAMA|ATMEST)/.test(st)) { skippedStatus++; return; }
      }
      const rawDate = row[dateCol], rawAmount = row[amountCol], rawDesc = descCol !== null ? row[descCol] : "";
      const date = parseFlexibleDate(rawDate);
      const amount = parseFlexibleAmount(rawAmount);
      if (!date || amount === null || amount === 0) return;
      const isIncome = !allExpense && amount > 0;
      const absAmount = Math.abs(amount);
      const suggested = suggestCategoryForMerchant(rawDesc) || state.categories[0];
      const h = hashRow(date, absAmount, rawDesc);
      drafts.push({
        id: uid(), date, amount: absAmount, rawDesc: rawDesc || "", kind: isIncome ? "income" : "expense",
        category: suggested, necessity: "reikalinga", include: !state.importedHashes.includes(h), duplicate: state.importedHashes.includes(h), hash: h,
      });
    });
    if (drafts.length === 0) { alert("Nepavyko atpažinti nė vieno įrašo. Patikrink stulpelių pasirinkimą."); return; }
    state.importSkippedInfo = (skippedCurrency || skippedStatus)
      ? `Praleista: ${skippedCurrency ? `${skippedCurrency} ne-EUR eilučių` : ""}${skippedCurrency && skippedStatus ? ", " : ""}${skippedStatus ? `${skippedStatus} neįvykdytų/laukiančių operacijų` : ""}.`
      : null;
    state.importDrafts = drafts;
    state.importStep = "review";
    render();
  } catch (err) {
    alert("Klaida apdorojant failą: " + err.message);
  }
}

function detectRecurringCandidates() {
  const groups = {};
  state.expenses.forEach(e => {
    if (e.recurringId) return;
    const bucket = Math.round(Number(e.amount));
    const key = e.category + "|" + bucket;
    if (!groups[key]) groups[key] = { category: e.category, amounts: [], months: new Set(), entries: [] };
    groups[key].amounts.push(Number(e.amount));
    groups[key].months.add(budgetMonthKeyForDate(e.date));
    groups[key].entries.push(e);
  });
  const candidates = [];
  Object.values(groups).forEach(g => {
    if (g.months.size >= 3) {
      const avgAmount = Math.round((g.amounts.reduce((s,a)=>s+a,0) / g.amounts.length) * 100) / 100;
      const alreadyTemplated = state.recurringTemplates.some(t => t.category === g.category && Math.abs(t.amount - avgAmount) < 1);
      if (!alreadyTemplated) {
        const latest = [...g.entries].sort((a,b) => b.date.localeCompare(a.date))[0];
        candidates.push({ category: g.category, amount: avgAmount, months: g.months.size, note: latest.note || "", entries: g.entries });
      }
    }
  });
  return candidates.sort((a,b) => b.months - a.months);
}

    const spendPct = Math.round((cur.spentTotal / cur.incomeTotal) * 100);
    if (spendPct > 90) tips.push({ tone:"warn", text:`Šį mėnesį išleidai ${spendPct}% savo pajamų — liko labai mažai atsargai.` });
    else if (spendPct < 60) tips.push({ tone:"ok", text:`Išleidai tik ${spendPct}% pajamų — gera atsarga liko.` });
  }

  const investCats = state.categories.filter(c => catType(c) === "investment");
  if (investCats.length && cur.incomeTotal > 0) {
    const investPct = Math.round((cur.investedTotal / cur.incomeTotal) * 100);
    if (investPct < 10) tips.push({ tone:"warn", text:`Investavai tik ${investPct}% pajamų šį mėnesį. Dažna rekomendacija — bent 15–20%.` });
    else tips.push({ tone:"ok", text:`Investavai ${investPct}% savo pajamų — puikus rodiklis, tęsk taip.` });
  }
  cur.underInvested.forEach(c => {
    const target = cur.investTarget(c);
    tips.push({ tone:"warn", text:`„${c}“ tikslas neįvykdytas: investuota €${fmt(cur.byCategory[c]||0)} iš €${fmt(target)}.` });
  });

  state.categories.filter(c => catType(c) !== "investment").forEach(c => {
    const curV = cur.byCategory[c] || 0, prevV = prev.byCategory[c] || 0;
    if (prevV > 5 && curV > prevV * 1.3) {
      const diff = Math.round(((curV - prevV) / prevV) * 100);
      tips.push({ tone:"warn", text:`„${c}“ išlaidos išaugo ${diff}% lyginant su ${monthLabel(prevKey)}.` });
    }
  });

  if (cur.spentTotal > 0 && cur.unnecessarySpent / cur.spentTotal > 0.3) {
    tips.push({ tone:"warn", text:`Beveik trečdalis išlaidų pažymėta kaip „nereikalinga“ — čia daugiausiai vietos taupymui.` });
  }
  if (cur.overCategories.length === 0 && cur.expenses.length > 0) {
    tips.push({ tone:"ok", text:"Visos kategorijos telpa į biudžetą — tvarkingai einasi." });
  }

  if (cur.expenses.length > 0) {
    const biggest = [...cur.expenses].sort((a,b) => b.amount - a.amount)[0];
    tips.push({ tone:"neutral", text:`Didžiausia šio mėnesio išlaida: €${fmt(biggest.amount)} (${escapeHtml(biggest.category)}).` });
  }

  if (monthKey === currentMonthKey() && cur.budgetTotal > 0) {
    const today = new Date();
    const dayOfMonth = today.getDate();
    const daysInMonth = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
    if (dayOfMonth >= 3) {
      const projected = (cur.spentTotal / dayOfMonth) * daysInMonth;
      if (projected > cur.budgetTotal * 1.05) {
        tips.push({ tone:"warn", text:`Šiuo tempu iki mėnesio pabaigos gali išleisti apie €${fmt(projected)} — tai daugiau nei biudžetas (€${fmt(cur.budgetTotal)}).` });
      } else if (projected < cur.budgetTotal * 0.8) {
        tips.push({ tone:"ok", text:`Šiuo tempu iki mėnesio pabaigos turėtum išleisti apie €${fmt(projected)} — gerokai mažiau nei biudžetas.` });
      }
    }
  }

  if (cur.incomeTotal === 0 && cur.expenses.length > 0) {
    tips.push({ tone:"neutral", text:"Šį mėnesį dar neįrašei jokių pajamų — pridėk, kad matytum tikslesnę biudžeto koreliaciją." });
  }

  if (cur.expenses.length >= 5) {
    const isWeekend = (dateStr) => { const day = new Date(dateStr).getDay(); return day === 0 || day === 6; };
    const weekendTotal = cur.expenses.filter(e => isWeekend(e.date)).reduce((s,e) => s + Number(e.amount), 0);
    const allTotal = cur.expenses.reduce((s,e) => s + Number(e.amount), 0);
    if (allTotal > 0 && weekendTotal / allTotal > 0.5) {
      tips.push({ tone:"neutral", text:`Daugiau nei pusė šio mėnesio išlaidų susikaupė savaitgaliais (€${fmt(weekendTotal)}).` });
    }
  }

  let streak = 0, checkKey = monthKey;
  for (let i = 0; i < 12; i++) {
    const dd = monthData(checkKey);
    if (!dd.hasData) break;
    if (dd.overCategories.length === 0 && (dd.budgetTotal <= 0 || dd.spentTotal <= dd.budgetTotal)) { streak++; checkKey = shiftedMonthKey(checkKey, -1); }
    else break;
  }
  if (streak >= 3) tips.push({ tone:"ok", text:`${streak} mėnesius iš eilės neišeini už biudžeto ribų — puikus pastovumas!` });

  if (state.baseIncome > 0) {
    const factor = scaleFactorForMonth(monthKey, mode);
    if (Math.abs(factor - 1) > 0.02) {
      tips.push({ tone:"neutral", text:`Lanksčios kategorijos šį mėnesį pritaikytos ${Math.round(factor*100)}% nuo įprasto dydžio, nes pajamos skyrėsi nuo bazinio atlyginimo.` });
    }
  }
  if (tips.length === 0) tips.push({ tone:"neutral", text:"Kai turėsi daugiau duomenų per kelis mėnesius, čia atsiras asmeniniai pastebėjimai." });
  return tips;
}

function allTimePaidForCategory(c) {
  return state.expenses.filter(e => e.category === c).reduce((s,e) => s + Number(e.amount), 0);
}
function savingsGoalWithdrawn(c) {
  return state.expenses.filter(e => e.fromSavings && e.savingsSource === c).reduce((s,e) => s + Number(e.amount), 0);
}
function netSavingsGoalAmount(c) {
  return Math.max(0, allTimePaidForCategory(c) - savingsGoalWithdrawn(c));
}
function loanTotalFor(c) { return (state.categoryConfig[c] && Number(state.categoryConfig[c].loanTotal)) || 0; }
function loanRemaining(c) { return Math.max(0, loanTotalFor(c) - allTimePaidForCategory(c)); }
function loanPayoffProjection(c) {
  const remaining = loanRemaining(c);
  const minPay = Number((state.categoryConfig[c]||{}).minPayment) || 0;
  const annualRate = Number((state.categoryConfig[c]||{}).interestRate) || 0;
  if (remaining <= 0) return { months: 0, date: null, neverPaysOff: false };
  if (minPay <= 0) return { months: null, date: null, neverPaysOff: false };
  const r = (annualRate / 100) / 12;
  let months;
  if (r <= 0) {
    months = remaining / minPay;
  } else {
    const monthlyInterest = remaining * r;
    if (minPay <= monthlyInterest) return { months: null, date: null, neverPaysOff: true };
    months = -Math.log(1 - (r * remaining) / minPay) / Math.log(1 + r);
  }
  months = Math.ceil(months);
  const d = new Date();
  d.setMonth(d.getMonth() + months);
  return { months, date: d, neverPaysOff: false };
}

function catRow(c, monthKey, d, mode, clickable) {
  const spent = d.byCategory[c]||0;
  const type = catType(c);
  const isInv = type === "investment";
  const isSavingsGoal = type === "savingsgoal";
  const isLoan = type === "loan";
  let color, pct, amountLabel, subLine = "";
  if (isInv || isSavingsGoal) {
    const target = d.investTarget(c);
    color = statusColorInvestment(spent, target);
    pct = target > 0 ? Math.min(100, (spent/target)*100) : (spent>0?100:0);
    amountLabel = target > 0 ? `€${fmt(spent)} iš €${fmt(target)}` : `€${fmt(spent)}`;
    if (isSavingsGoal) {
      const proj = requiredMonthlyForGoal(c);
      if (proj) subLine = proj.monthly !== null
        ? `<div style="font-size:11px;color:var(--faint);margin-top:3px;">Tikslas €${fmt(proj.targetAmount)} · reikia €${fmt(proj.monthly)}/mėn. (${proj.months} mėn. liko)</div>`
        : `<div style="font-size:11px;color:var(--faint);margin-top:3px;">Tikslas €${fmt(proj.targetAmount)} · liko €${fmt(proj.remaining)}</div>`;
    }
  } else if (isLoan) {
    const total = loanTotalFor(c);
    const minPay = d.loanMinPayment(c);
    const remaining = loanRemaining(c);
    color = statusColorLoan(spent, minPay);
    pct = minPay > 0 ? Math.min(100, (spent/minPay)*100) : (spent>0?100:0);
    amountLabel = minPay > 0 ? `€${fmt(spent)} / €${fmt(minPay)} įmoka` : `€${fmt(spent)} šį mėn.`;
    subLine = total > 0 ? `<div style="font-size:11px;color:var(--faint);margin-top:3px;">Bendras likutis: €${fmt(remaining)} iš €${fmt(total)}${(() => {
      const proj = loanPayoffProjection(c);
      if (proj.neverPaysOff) return ` · <span style="color:var(--rust)">įmoka nepadengia palūkanų</span>`;
      if (proj.date) return ` · be skolos apie ${MONTH_NAMES[proj.date.getMonth()]} ${proj.date.getFullYear()}`;
      return "";
    })()}</div>` : "";
  } else {
    const budget = effectiveBudget(c, monthKey, mode);
    color = statusColorExpense(spent, budget);
    pct = budget > 0 ? Math.min(100,(spent/budget)*100) : (spent>0?100:0);
    amountLabel = `€${fmt(spent)}${budget>0?` / €${fmt(budget)}`:""}`;
  }
  const scaled = !isInv && !isSavingsGoal && !isLoan && !isEssential(c) && state.baseIncome > 0 && Math.abs(scaleFactorForMonth(monthKey, mode)-1) > 0.02;
  const isActive = state.categoryFilter === c;
  const clickAttr = clickable ? `onclick="toggleCategoryFilter('${c}')" style="cursor:pointer;${isActive?'background:rgba(201,162,39,0.08);border-radius:8px;':''}"` : "";
  return `<div class="ledger-row" ${clickAttr}>
    <div class="cat-line">
      <span class="cat-name"><span>${catEmoji(c)}${c}</span>${isInv?`<span class="cat-tag">Investicija</span>`:""}${isSavingsGoal?`<span class="cat-tag" style="color:var(--gold);border-color:var(--gold);">Taupymo tikslas</span>`:""}${isLoan?`<span class="cat-tag" style="color:var(--blue);border-color:var(--blue);">Paskola</span>`:""}${scaled?`<span class="scaled-tag">~pritaikyta</span>`:""}</span>
      <span class="tape cat-amount" style="color:${color}">${amountLabel}</span>
    </div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
    ${subLine}
  </div>`;
}
function toggleCategoryFilter(c) {
  state.categoryFilter = state.categoryFilter === c ? null : c;
  render();
}

function renderOverview() {
  const monthKey = currentMonthKey();
  const d = monthData(monthKey, "budget");

  const over = d.spentTotal > d.budgetTotal && d.budgetTotal > 0;
  const prog = periodProgress(monthKey, "budget");
  const avgDaily = d.spentTotal / prog.elapsed;

        <span class="tape" style="font-size:15px;">€${fmt(item.amount)}</span>
        <button class="icon-btn" onclick="duplicateExpense('${item.id}')" aria-label="Kopijuoti įrašą">${ICONS.copy}</button>

      </div>

  return `

    <div style="font-size:12px;color:var(--faint);margin-bottom:8px;">Kai kurie saugoti duomenys (${state.dataIntegrityWarning.join(", ")}) buvo neteisingo formato ir nebuvo įkelti — programėlė naudoja saugius numatytuosius nustatymus tose vietose. Jei turi atsarginę kopiją, rekomenduojame ją atkurti (Finansai → Atsarginė kopija).</div>
    <button type="button" class="submit-btn" style="padding:6px 0;font-size:12px;background:var(--surface-light);color:var(--paper);" onclick="state.dataIntegrityWarning=null;render();">Supratau, paslėpti</button>
  </div>` : ""}

    <div class="display" style="font-size:20px;font-weight:600;text-align:center;margin-bottom:14px;">${periodLabel(monthKey, "budget")}</div>
    <div class="total-row">

      const overIncome = totalAllocated > d.incomeTotal;
      return `<div style="text-align:center;font-size:11px;margin-top:6px;color:${overIncome?'var(--rust)':'var(--faint)'};">Iš viso paskirstyta (išlaidos + investicijos + taupymas): €${fmt(totalAllocated)} — ${Math.round(pctOfIncome)}% pajamų${overIncome ? ' ⚠️ viršija pajamas' : ''}</div>`;
    })() : ""}
    ${d.savingsSpent > 0 ? `<div style="text-align:center;font-size:11px;color:var(--faint);margin-top:4px;">Iš jų €${fmt(d.savingsSpent)} apmokėta iš santaupų šį mėnesį (neįskaičiuota į biudžetą)</div>` : ""}
    ${d.budgetTotal > 0 ? `<div style="text-align:center;font-size:11px;color:var(--faint);margin-top:6px;">Vidutiniškai €${fmt(avgDaily)}/d. · ${
      prog.remaining > 0
        ? (suggestedDaily >= 0 ? `liko €${fmt(suggestedDaily)}/d. (dar ${prog.remaining} d.)` : `viršyta €${fmt(Math.abs(suggestedDaily))}/d.`)
        : (remainingBudget >= 0 ? `paskutinė diena, liko €${fmt(remainingBudget)}` : `viršyta iš viso €${fmt(Math.abs(remainingBudget))}`)
    }</div>` : ""}
    ${state.savingsGoalMin > 0 && state.savingsBalance < state.savingsGoalMin ? `<div class="over-warning">${ICONS.alert}<span>Santaupos (€${fmt(state.savingsBalance)}) žemiau nustatytos ribos (€${fmt(state.savingsGoalMin)})</span></div>` : ""}
    ${d.overCategories.length ? `<div class="over-warning">${ICONS.alert}<span>Viršyta: ${d.overCategories.join(", ")}</span></div>` : ""}
    ${d.underpaidLoans.length ? `<div class="over-warning">${ICONS.alert}<span>Nesumokėta min. įmoka: ${d.underpaidLoans.join(", ")}</span></div>` : ""}
    ${d.nearingCategories.length ? `<div class="over-warning" style="color:var(--gold);">${ICONS.alert}<span>Artėji prie limito: ${d.nearingCategories.join(", ")}</span></div>` : ""}
  </div>
  <div class="tabpanel fade-in">
    ${state.gaugeStyle === "fuel"
      ? `<div class="chart-wrap" style="height:150px;">${fuelGaugeSVG(Math.max(d.budgetTotal-d.spentTotal,0), d.budgetTotal)}</div>`
      : ringGaugeSVG(d.spentTotal, d.budgetTotal)}
    <div class="legend">
      <span><span class="legend-dot" style="background:var(--green)"></span>gerai</span>
      <span><span class="legend-dot" style="background:var(--gold)"></span>dėmesio</span>
      <span><span class="legend-dot" style="background:var(--rust)"></span>viršyta</span>
    </div>
    <div class="section-label" style="display:flex;justify-content:space-between;align-items:center;">
      <span>Pagal kategoriją <span style="text-transform:none;letter-spacing:0;color:var(--faint);font-size:11px;">(bakstelėk filtruoti)</span></span>
      <span style="display:flex;gap:4px;">
        <button type="button" onclick="setCategoryViewStyle('bars')" style="font-size:10px;padding:3px 8px;border-radius:5px;border:1px solid ${state.categoryViewStyle!=='pie'?'var(--gold)':'rgba(237,234,224,0.15)'};background:${state.categoryViewStyle!=='pie'?'rgba(201,162,39,0.12)':'transparent'};color:${state.categoryViewStyle!=='pie'?'var(--gold)':'var(--faint)'};text-transform:none;letter-spacing:0;">Juostos</button>
        <button type="button" onclick="setCategoryViewStyle('pie')" style="font-size:10px;padding:3px 8px;border-radius:5px;border:1px solid ${state.categoryViewStyle==='pie'?'var(--gold)':'rgba(237,234,224,0.15)'};background:${state.categoryViewStyle==='pie'?'rgba(201,162,39,0.12)':'transparent'};color:${state.categoryViewStyle==='pie'?'var(--gold)':'var(--faint)'};text-transform:none;letter-spacing:0;">Pyragėlis</button>
      </span>
    </div>
    ${state.categoryViewStyle === "pie" ? `
      ${categoryPieSVG(d)}
      ${state.categories.filter(c => catType(c) !== "expense").map(c => catRow(c, monthKey, d, "budget", true)).join("")}
    ` : rows}
    <div class="section-label" style="margin-top:22px;">Šio mėnesio įrašai</div>
    ${filterChip}
    <input id="search_input" type="text" placeholder="Ieškoti (kategorija, pastaba)..." value="${state.searchQuery}" oninput="state.searchQuery=this.value;state._focusSearch=true;render();" style="margin-bottom:12px;" />
    ${itemRows}
    ${otherMonthMatches.length ? `
      <div class="section-label" style="margin-top:20px;">Kitų mėnesių rezultatai</div>
      ${otherMonthMatches.map(item => item.kind === "expense" ? `
        <div class="ledger-row" style="display:flex;align-items:center;gap:10px;padding:8px 0;">
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;">${escapeHtml(item.category)}</div>
            <div style="font-size:11px;color:var(--faint);">${item.date.split("-").reverse().join(".")}${item.note?` · ${escapeHtml(item.note)}`:""}</div>
          </div>
          <span class="tape" style="font-size:14px;">€${fmt(item.amount)}</span>
        </div>` : `
        <div class="ledger-row" style="display:flex;align-items:center;gap:10px;padding:8px 0;">
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;color:var(--green);">↑ ${escapeHtml(item.label)}</div>
            <div style="font-size:11px;color:var(--faint);">${item.date.split("-").reverse().join(".")}</div>
          </div>
          <span class="tape" style="font-size:14px;color:var(--green);">+€${fmt(item.amount)}</span>
        </div>`
      ).join("")}
    ` : ""}
  </div>`;
}

function overallGaugeColor(remaining, budget) {
  if (budget <= 0) return "#8FA098";
  if (remaining <= 0) return "#D97742";
  const remPct = remaining / budget;
  return remPct > 0.3 ? "#6FBF73" : "#C9A227";
}

function hexToRgb(hex) { const n = parseInt(hex.slice(1), 16); return { r: (n>>16)&255, g: (n>>8)&255, b: n&255 }; }
function lerpColor(c1, c2, t) {
  const p1 = hexToRgb(c1), p2 = hexToRgb(c2);
  const r = Math.round(p1.r + (p2.r - p1.r) * t);
  const g = Math.round(p1.g + (p2.g - p1.g) * t);
  const b = Math.round(p1.b + (p2.b - p1.b) * t);
  return `rgb(${r},${g},${b})`;
}
function gaugeColorAt(p) {
  if (p <= 0.35) return lerpColor("#D97742", "#C9A227", p / 0.35);
  return lerpColor("#C9A227", "#6FBF73", (p - 0.35) / 0.65);
}

function fuelGaugeSVG(remaining, budget) {
  const remPct = budget > 0 ? Math.max(0, Math.min(1, remaining / budget)) : 0;
  const needleColor = overallGaugeColor(remaining, budget);
  const cx = 120, cy = 96, r = 74, needleLen = 58;
  function pointAt(p, radius) {
    const angle = (180 - p * 180) * Math.PI / 180;
    return [cx + radius * Math.cos(angle), cy - radius * Math.sin(angle)];
  }
  function arcPath(p0, p1, radius) {
    const [x0, y0] = pointAt(p0, radius), [x1, y1] = pointAt(p1, radius);
    return `M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${radius} ${radius} 0 0 1 ${x1.toFixed(2)} ${y1.toFixed(2)}`;
  }
  const segments = 36;
  let arcs = "";
  for (let i = 0; i < segments; i++) {
    const p0 = i / segments, p1 = (i + 1) / segments;
    const color = gaugeColorAt((p0 + p1) / 2);
    arcs += `<path d="${arcPath(p0, p1, r)}" stroke="${color}" stroke-width="14" fill="none" stroke-linecap="round"/>`;
  }
  const [nx, ny] = pointAt(remPct, needleLen);
  return `<svg viewBox="0 0 240 130" style="width:100%;max-width:280px;display:block;margin:0 auto;">
    ${arcs}
    <text x="24" y="${cy+20}" fill="#D97742" font-size="16" font-weight="700" font-family="'IBM Plex Mono',monospace">E</text>
    <text x="216" y="${cy+20}" fill="#6FBF73" font-size="16" font-weight="700" font-family="'IBM Plex Mono',monospace" text-anchor="end">F</text>
    <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(2)}" y2="${ny.toFixed(2)}" stroke="${needleColor}" stroke-width="4" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="6" fill="${needleColor}"/>
  </svg>`;
}

function categoryPieSVG(d) {
  const expenseCats = state.categories.filter(c => catType(c) === "expense" && (d.byCategory[c]||0) > 0);
  const total = expenseCats.reduce((s,c) => s + (d.byCategory[c]||0), 0);
  if (total <= 0) return `<div style="height:140px;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:13px;">Nėra išlaidų šį mėnesį.</div>`;
  const colors = ["#C9A227","#6FA3BF","#D97742","#6FBF73","#B084CC","#E0607E","#5FBFB3","#D9B24C","#8892E0","#E08A5F"];
  const size = 180, r = 80, cx = size/2, cy = size/2;
  let angle = -90;
  const sorted = [...expenseCats].sort((a,b) => (d.byCategory[b]||0)-(d.byCategory[a]||0));
  const paths = sorted.map((c, i) => {
    const value = d.byCategory[c]||0;
    const fraction = value/total;
    const sweep = fraction * 360;
    const startAngle = angle;
    const endAngle = angle + sweep;
    angle = endAngle;
    const largeArc = sweep > 180 ? 1 : 0;
    const startRad = (startAngle * Math.PI)/180, endRad = (endAngle*Math.PI)/180;
    const x1 = cx + r*Math.cos(startRad), y1 = cy + r*Math.sin(startRad);
    const x2 = cx + r*Math.cos(endRad), y2 = cy + r*Math.sin(endRad);
    const color = colors[i % colors.length];
    return sorted.length === 1
      ? `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" />`
      : `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${largeArc} 1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${color}" />`;
  }).join("");
  const legend = sorted.map((c,i) => `<div style="display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 0;"><span style="width:10px;height:10px;border-radius:50%;background:${colors[i%colors.length]};display:inline-block;flex-shrink:0;"></span><span>${catEmoji(c)}${escapeHtml(c)}</span><span class="tape" style="margin-left:auto;color:var(--faint);">€${fmt(d.byCategory[c])} (${Math.round((d.byCategory[c]/total)*100)}%)</span></div>`).join("");
  return `<svg viewBox="0 0 ${size} ${size}" style="width:100%;max-width:200px;height:auto;display:block;margin:0 auto;">${paths}</svg>
    <div style="margin-top:10px;">${legend}</div>`;
}
function ringGaugeSVG(spent, budget) {
  if (budget <= 0 && spent <= 0) {
    return `<div style="height:160px;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:13px;background:var(--surface);border-radius:12px;">Kai nustatysi biudžetą ir pridėsi išlaidų, čia atsiras indikatorius.</div>`;
  }
  const size = 168, strokeW = 16, r = (size - strokeW) / 2, cx = size / 2, cy = size / 2;
  const circumference = 2 * Math.PI * r;
  const remaining = Math.max(budget - spent, 0);
  const over = spent > budget && budget > 0;
  const track = "rgba(237,234,224,0.12)";
  const color = budget <= 0 ? track : overallGaugeColor(remaining, budget);
  const fracRemaining = budget <= 0 ? 0 : (over ? 1 : remaining / budget);
  const dashOffset = circumference * (1 - fracRemaining);
  return `<div class="chart-wrap">
    <svg width="100%" height="190" viewBox="0 0 ${size} ${size}" style="display:block;margin:0 auto;max-width:190px;">
      <circle cx="${cx}" cy="${cy}" r="${r}" stroke="${track}" stroke-width="${strokeW}" fill="none"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" stroke="${color}" stroke-width="${strokeW}" fill="none"
        stroke-dasharray="${circumference.toFixed(2)}" stroke-dashoffset="${dashOffset.toFixed(2)}"
        stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})" />
    </svg>
    <div class="chart-center"><div class="tape" style="font-size:16px;font-weight:600;">€${fmt(spent)}</div><div style="font-size:10px;color:var(--faint);">išleista</div></div>
  </div>`;
}

let tabSwipeAttached = false;
function attachTabSwipe() {
  if (tabSwipeAttached) return;
  tabSwipeAttached = true;
  const app = document.getElementById("app");
  const order = ["overview", "add", "report", "rules", "finance", "settings"];
  let startX = 0, startY = 0, dragging = false, locked = false;
  app.addEventListener("touchstart", (e) => {
    if (state.appPin && state.appLocked) { dragging = false; return; }
    if (state.importStep || state.showHelp) { dragging = false; return; }
    if (e.target.closest(".swipe-wrapper")) { dragging = false; return; }
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    dragging = true; locked = false;
  }, { passive: true });
  app.addEventListener("touchmove", (e) => {
    if (!dragging) return;
    const x = e.touches[0].clientX - startX, y = e.touches[0].clientY - startY;
    if (!locked) {
      if (Math.abs(x) < 10 && Math.abs(y) < 10) return;
      locked = Math.abs(x) > Math.abs(y) * 1.5;
      if (!locked) { dragging = false; return; }
    }
  }, { passive: true });
  app.addEventListener("touchend", (e) => {
    if (!dragging || !locked) { dragging = false; return; }
    const dx = e.changedTouches[0].clientX - startX;
    dragging = false;
    if (Math.abs(dx) < 60) return;
    const idx = order.indexOf(state.tab);
    if (idx === -1) return;
    if (dx < 0 && idx < order.length - 1) setTab(order[idx+1]);
    else if (dx > 0 && idx > 0) setTab(order[idx-1]);
  });
}
function attachSwipeHandlers() {
  document.querySelectorAll(".swipe-wrapper").forEach((wrapper) => {
    const content = wrapper.querySelector(".swipe-content");
    if (!content) return;
    const id = wrapper.dataset.id, kind = wrapper.dataset.kind;
    let startX = 0, startY = 0, dx = 0, dragging = false, locked = false;
    content.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX; startY = e.touches[0].clientY;
      dragging = true; locked = false; dx = 0;
      content.style.transition = "none";
    }, { passive: true });
    content.addEventListener("touchmove", (e) => {
      if (!dragging) return;
      const x = e.touches[0].clientX - startX, y = e.touches[0].clientY - startY;
      if (!locked) { if (Math.abs(x) < 8 && Math.abs(y) < 8) return; locked = Math.abs(x) > Math.abs(y); if (!locked) { dragging = false; return; } }
      dx = Math.max(-110, Math.min(110, x));
      content.style.transform = `translateX(${dx}px)`;
    }, { passive: true });
    content.addEventListener("touchend", () => {
      if (!dragging) return;
      dragging = false;
      content.style.transition = "transform 0.2s ease";
      if (dx < -70) {
        content.style.transform = "translateX(-100%)";
        setTimeout(() => { kind === "expense" ? removeExpense(id) : removeIncome(id); }, 140);
      } else if (dx > 70) {
        content.style.transform = "translateX(0)";
        kind === "expense" ? editExpense(id) : editIncome(id);
      } else {
        content.style.transform = "translateX(0)";
      }
      dx = 0;
    });
  });
}
function duplicateExpense(id) {
  const src = state.expenses.find(e => e.id === id);
  if (!src) return;
  if (src.fromSavings) state.savingsBalance -= Number(src.amount);
  state.expenses.unshift({ ...src, id: uid(), date: new Date().toISOString().slice(0,10), recurringId: undefined });
  persistAll(); render();
  showToast("Įrašas nukopijuotas su šiandienos data");
}
function frequentCategoryChips() {
  const counts = {};
  state.expenses.slice(0, 200).forEach(e => { counts[e.category] = (counts[e.category]||0) + 1; });
  const top = Object.keys(counts).sort((a,b) => counts[b]-counts[a]).slice(0, 3);

    ${top.map(c => `<button type="button" onclick="document.getElementById('f_category').value='${c}';" style="font-size:12px;padding:6px 10px;border-radius:14px;border:1px solid rgba(237,234,224,0.15);background:var(--surface);color:var(--paper);">${catEmoji(c)}${c}</button>`).join("")}

}

function submitAdd(ev) {
  ev.preventDefault();
  const amountRaw = document.getElementById("f_amount").value;
  const amount = parseFloat(amountRaw.replace(",", "."));
  if (!amountRaw.trim() || isNaN(amount) || amount <= 0) {
    state.formError = "Įvesk teisingą sumą (didesnę už 0)."; render(); return false;
  }
  const date = document.getElementById("f_date").value;
  if (!date) { state.formError = "Pasirink datą."; render(); return false; }
  const fromSavings = document.getElementById("f_fromsavings").checked;
  const event = fromSavings ? document.getElementById("f_event").value.trim() : "";
  const savingsSourceEl = document.getElementById("f_savingssource");
  const savingsSource = fromSavings && savingsSourceEl ? savingsSourceEl.value : "";
  const fields = {
    amount, category: document.getElementById("f_category").value,
    date, note: document.getElementById("f_note").value.trim(),
    necessity: document.getElementById("f_necessity").value,
    fromSavings, event, savingsSource,
  };
  if (state.editingExpenseId) {
    const idx = state.expenses.findIndex(e => e.id === state.editingExpenseId);
    if (idx !== -1) {
      const old = state.expenses[idx];
      if (old.fromSavings) state.savingsBalance += Number(old.amount);
      if (fromSavings) state.savingsBalance -= amount;
      if (catType(old.category) === "savingsgoal") state.savingsBalance -= Number(old.amount);
      if (catType(fields.category) === "savingsgoal") state.savingsBalance += amount;
      state.expenses[idx] = { ...old, ...fields };
    }
    state.editingExpenseId = null;
    showToast("Išlaida atnaujinta");
  } else {
    if (fromSavings) state.savingsBalance -= amount;
    if (catType(fields.category) === "savingsgoal") state.savingsBalance += amount;
    state.expenses.unshift({ id: uid(), ...fields });
    showToast(fromSavings ? "Išlaida įrašyta iš santaupų" : "Išlaida įrašyta");
  }
  state.formError = null;
  const entryMonth = budgetMonthKeyForDate(date);
  state.reportCursor = entryMonth;
  state.tab = entryMonth === currentMonthKey() ? "overview" : "report";
  persistAll(); render();
  return false;
}
function submitIncome(ev) {
  ev.preventDefault();
  const amountRaw = document.getElementById("i_amount").value;
  const amount = parseFloat(amountRaw.replace(",", "."));
  if (!amountRaw.trim() || isNaN(amount) || amount <= 0) {
    state.formError = "Įvesk teisingą sumą (didesnę už 0)."; render(); return false;
  }
  const date = document.getElementById("i_date").value;
  if (!date) { state.formError = "Pasirink datą."; render(); return false; }
  const fields = { amount, label: document.getElementById("i_label").value.trim() || "Pajamos", date };
  if (state.editingIncomeId) {
    const idx = state.incomes.findIndex(i => i.id === state.editingIncomeId);
    if (idx !== -1) state.incomes[idx] = { ...state.incomes[idx], ...fields };

    state.incomes.unshift({ id: uid(), ...fields });

  const entryMonth = budgetMonthKeyForDate(date);
  state.reportCursor = entryMonth;

}

function amortizedPayment(principal, annualRatePct, years) {
  const n = Math.round(years * 12);
  const r = (annualRatePct / 100) / 12;
  if (n <= 0) return 0;
  if (r <= 0) return principal / n;
  return principal * r * Math.pow(1+r, n) / (Math.pow(1+r, n) - 1);
}
function pctCheck(safe, text) {
  return { tone: safe ? "ok" : "risk", text };
}
function evaluatePurchase(type, price, down, years, rate) {
  const loanAmount = Math.max(0, price - down);
  const monthly = amortizedPayment(loanAmount, rate, years);
  const totalPaid = monthly * years * 12;
  const totalInterest = Math.max(0, totalPaid - loanAmount);
  const downPct = price > 0 ? (down / price) * 100 : 0;
  const income = state.baseIncome;
  const existingDebt = state.categories.filter(c => catType(c) === "loan")
    .reduce((s, c) => s + (Number((state.categoryConfig[c]||{}).minPayment) || 0), 0);
  const totalDebtAfter = existingDebt + monthly;

  const checks = [];
  if (!income || income <= 0) {
    checks.push({ tone: "warn", text: "Nustatyk „Pajamų bazę“ Nustatymuose, kad gautum tikslų saugumo įvertinimą pagal pajamas." });
  } else {
    const monthlyPct = (monthly / income) * 100;
    const totalDebtPct = (totalDebtAfter / income) * 100;
    if (type === "car") {
      checks.push(pctCheck(downPct >= 20, `Pradinis įnašas ${downPct.toFixed(0)}% (rekomenduojama bent 20%)`));
      checks.push(pctCheck(years <= 4, `Paskolos terminas ${years} m. (rekomenduojama iki 4 m.)`));
      checks.push(pctCheck(monthlyPct <= 10, `Įmoka ${monthlyPct.toFixed(1)}% pajamų (rekomenduojama iki 10%)`));
    } else if (type === "house") {
      checks.push(pctCheck(monthlyPct <= 28, `Būsto įmoka ${monthlyPct.toFixed(1)}% pajamų (rekomenduojama iki 28%)`));
      checks.push(pctCheck(totalDebtPct <= 36, `Bendra skolų našta ${totalDebtPct.toFixed(1)}% pajamų (rekomenduojama iki 36%)`));
    } else {
      checks.push(pctCheck(totalDebtPct <= 30, `Bendra skolų našta ${totalDebtPct.toFixed(1)}% pajamų (dauguma rekomendacijų siūlo neviršyti 30%)`));
    }
  }
  const verdict = checks.some(c => c.tone === "risk") ? "risk" : (checks.some(c => c.tone === "warn") ? "warn" : "ok");
  return { loanAmount, monthly, totalPaid, totalInterest, checks, verdict };
}

function applyDebtStrategy() {

  if (loanCats.length === 0) return;
  const strategy = state.debtStrategy || "snowball";
  const sorted = [...loanCats].sort((a,b) => {
    if (strategy === "avalanche") {
      const ra = Number((state.categoryConfig[a]||{}).interestRate)||0, rb = Number((state.categoryConfig[b]||{}).interestRate)||0;

  });

function toggleBudgetRule(ruleId) {
  if (state.appliedRules[ruleId]) {
    const snap = state.ruleSnapshots[ruleId];
    if (snap) {
      Object.keys(snap.budgets).forEach(c => { if (c in state.budgets || state.categories.includes(c)) state.budgets[c] = snap.budgets[c]; });
    }
    delete state.ruleSnapshots[ruleId];
    state.appliedRules[ruleId] = false;
    persistAll(); render();
    showToast("Taisyklė atšaukta — grąžinta prie ankstesnio biudžeto");
    return;
  }
  if (ruleId === "503020") {
    const income = state.baseIncome;
    if (!income || income <= 0) { alert("Pirma nustatyk „Pajamų bazę“ Nustatymuose."); return; }
    const flexCats = state.categories.filter(c => catType(c) === "expense" && !isEssential(c));
    const investCats = state.categories.filter(c => catType(c) === "investment" || catType(c) === "savingsgoal");
    const snapBudgets = {};
    flexCats.forEach(c => snapBudgets[c] = state.budgets[c]);
    if (investCats.length) snapBudgets[investCats[0]] = state.budgets[investCats[0]];
    state.ruleSnapshots[ruleId] = { budgets: snapBudgets };
    const idealWants = income * 0.3, idealSavings = income * 0.2;
    const currentFlexTotal = flexCats.reduce((s,c) => s + (Number(state.budgets[c])||0), 0);
    if (currentFlexTotal > 0) {
      const factor = idealWants / currentFlexTotal;
      flexCats.forEach(c => { state.budgets[c] = Math.round((Number(state.budgets[c])||0) * factor * 100) / 100; });
    } else if (flexCats.length > 0) {
      const each = idealWants / flexCats.length;
      flexCats.forEach(c => { state.budgets[c] = Math.round(each * 100) / 100; });
    }
    if (investCats.length > 0) { state.budgets[investCats[0]] = Math.round(idealSavings * 100) / 100; }
    state.appliedRules[ruleId] = true;
    persistAll(); render();
    showToast("50/30/20 pritaikyta lanksčioms kategorijoms");
  }
}

function handlePortfolioCsvFile(input) {
  const file = input.files && input.files[0];
  if (!file) { alert("Failas nepasirinktas. Patikrink, ar failo pavadinimas tikrai baigiasi .csv."); return; }
  state.portfolioImportFile = file;
  const reader = new FileReader();
  reader.onload = (e) => processPortfolioCsvText(e.target.result);
  reader.onerror = () => alert("Nepavyko perskaityti failo: " + reader.error);
  reader.readAsText(file, "UTF-8");
}
function processPortfolioCsvText(text) {
  try {
    const allRows = parseCSV(text);
    if (!allRows || allRows.length === 0) { alert("Failas tuščias arba nepavyko perskaityti."); return; }
    const headerIdx = findHeaderRowIndex(allRows);
    const headers = allRows[headerIdx];
    const dataRows = allRows.slice(headerIdx + 1);
    if (dataRows.length === 0) { alert("Faile nerasta duomenų eilučių."); return; }
    state.portfolioImportRaw = { headers, dataRows };
    state.portfolioImportMapping = {
      symbolCol: guessColumn(headers, ["symbol", "ticker", "instrument", "isin", "security", "pavadinimas"]),
      qtyCol: guessColumn(headers, ["quantity", "qty", "units", "kiekis", "vienetai", "shares", "no. of shares"]),
      amountCol: guessColumn(headers, ["amount", "total", "suma", "value", "cost", "total amount", "net cash", "proceeds"], ["fee", "mokestis", "commission"]),
      priceCol: guessColumn(headers, ["price", "kaina", "price / share", "price per share", "trade price", "fill price"]),
      actionCol: guessColumn(headers, ["action", "type", "activity type", "buy/sell", "veiksmas"]),
      amountMode: "total",
    };
    state.portfolioImportStep = "mapping";
    render();
  } catch (err) {
    alert("Klaida skaitant failą: " + err.message);
  }
}
function updatePortfolioMapping(field, val) {
  const numericFields = ["symbolCol","qtyCol","amountCol","priceCol","actionCol"];
  state.portfolioImportMapping[field] = field === "amountMode" ? val : (numericFields.includes(field) ? (val === "" ? null : Number(val)) : val);
  render();
}
function proceedToPortfolioReview() {
  try {
    const { dataRows } = state.portfolioImportRaw;
    const { symbolCol, qtyCol, amountCol, priceCol, amountMode, actionCol } = state.portfolioImportMapping;
    if (symbolCol === null || qtyCol === null) { alert("Pasirink bent tikslo ir kiekio stulpelius."); return; }
    if (amountMode === "total" && amountCol === null) { alert("Pasirink bendros sumos stulpelį, arba perjunk į „Vieneto kaina“."); return; }
    if (amountMode === "price" && priceCol === null) { alert("Pasirink vieneto kainos stulpelį, arba perjunk į „Bendra suma“."); return; }
    let skippedNonBuy = 0;
    const groups = {};
    dataRows.forEach((row) => {
      if (actionCol !== null) {
        const action = (row[actionCol] || "").toLowerCase();
        const looksLikeBuy = action.includes("buy") || action.includes("pirk");
        const looksLikeOther = action.includes("sell") || action.includes("dividend") || action.includes("deposit") || action.includes("withdraw") || action.includes("interest") || action.includes("fee") || action.includes("parduot") || action.includes("dividend");
        if (looksLikeOther && !looksLikeBuy) { skippedNonBuy++; return; }
      }
      const sym = (row[symbolCol] || "").trim().toUpperCase();
      if (!sym) return;
      const qty = parseFlexibleAmount(row[qtyCol]);
      if (qty === null || qty === 0) return;
      let amt;
      if (amountMode === "total") amt = parseFlexibleAmount(row[amountCol]);
      else amt = qty * (parseFlexibleAmount(row[priceCol]) || 0);
      if (!groups[sym]) groups[sym] = { units: 0, invested: 0 };
      groups[sym].units += Math.abs(qty);
      groups[sym].invested += Math.abs(amt || 0);
    });
    const drafts = Object.keys(groups).map(sym => ({ id: uid(), ticker: sym, units: groups[sym].units, invested: groups[sym].invested, include: true }));
    if (drafts.length === 0) { alert("Nepavyko atpažinti nė vieno įrašo. Patikrink stulpelių pasirinkimą."); return; }
    state.portfolioImportSkipped = skippedNonBuy;
    state.portfolioImportDrafts = drafts;
    state.portfolioImportStep = "review";
    render();
  } catch (err) {
    alert("Klaida apdorojant failą: " + err.message);
  }
}

function computeFinancialHealthScore() {
  const monthKey = currentMonthKey();
  const d = monthData(monthKey, "budget");
  let budgetScore = 25;
  if (d.budgetTotal > 0) {
    const ratio = d.spentTotal / d.budgetTotal;
    budgetScore = ratio <= 1 ? 25 : Math.max(0, 25 - (ratio-1)*50);
  }
  let savingsScore = 0;
  if (d.incomeTotal > 0) {
    const rate = (d.investedTotal + d.savingsGoalTotal) / d.incomeTotal;
    savingsScore = Math.min(25, (rate/0.20)*25);
  }
  const essentialCats = state.categories.filter(c => catType(c)==="expense" && isEssential(c));
  const avgEssential = essentialCats.reduce((s,c)=>s+(Number(state.budgets[c])||0),0);
  let fundScore = 12.5;
  if (avgEssential > 0) {
    const targetFund = avgEssential*3;
    fundScore = Math.min(25, Math.max(0, (state.savingsBalance/targetFund)*25));
  }
  let debtScore = 25;
  if (d.incomeTotal > 0) {
    const loanCats = state.categories.filter(c=>catType(c)==="loan");
    const totalMinPay = loanCats.reduce((s,c)=>s+(Number((state.categoryConfig[c]||{}).minPayment)||0),0);
    const debtRatio = totalMinPay/d.incomeTotal;
    debtScore = debtRatio<=0 ? 25 : Math.max(0, 25 - (debtRatio/0.20)*25);
  }
  const total = Math.round(budgetScore+savingsScore+fundScore+debtScore);
  return { total: Math.max(0,Math.min(100,total)), budgetScore: Math.round(budgetScore), savingsScore: Math.round(savingsScore), fundScore: Math.round(fundScore), debtScore: Math.round(debtScore) };
}
function healthScoreLabel(score) {
  if (score >= 80) return { text: "Puiku", color: "var(--green)" };
  if (score >= 60) return { text: "Gerai", color: "var(--gold)" };
  if (score >= 40) return { text: "Vidutiniškai", color: "var(--gold)" };
  return { text: "Reikia dėmesio", color: "var(--rust)" };
}
function computeCurrentNetWorth() {
  const savings = state.savingsBalance;
  const invested = allTimeInvestedTotal();
  const savingsGoals = allTimeSavingsGoalTotal();
  const portfolio = portfolioCurrentValue();
  const crypto = cryptoPortfolioValue();
  const loans = allTimeLoanRemainingTotal();
  return { savings, invested, savingsGoals, portfolio, crypto, loans, netWorth: savings + invested + savingsGoals + portfolio + crypto - loans };
}
function recordNetWorthSnapshot() {
  const monthKey = currentMonthKey();
  const exists = state.netWorthHistory.some(h => h.monthKey === monthKey);
  const nw = computeCurrentNetWorth();
  if (exists) {
    const h = state.netWorthHistory.find(h => h.monthKey === monthKey);
    Object.assign(h, nw);
  } else {
    state.netWorthHistory.push({ monthKey, ...nw });
    state.netWorthHistory.sort((a,b) => a.monthKey.localeCompare(b.monthKey));
  }
  save("netWorthHistory", state.netWorthHistory);
}
function netWorthTrendSVG() {
  const points = state.netWorthHistory.slice(-12);
  if (points.length < 2) {
    return `<div style="font-size:12px;color:var(--faint);padding:20px 0;text-align:center;">Tendencija atsiras, kai turėsi bent 2 mėnesių įrašus. Grynasis turtas registruojamas automatiškai kas mėnesį nuo šiol.</div>`;
  }
  const values = points.map(p => p.netWorth);
  const minVal = Math.min(0, ...values), maxVal = Math.max(1, ...values);
  const range = maxVal - minVal || 1;
  const w = 320, h = 140, padL = 44, padR = 10, padT = 12, padB = 20;
  const plotW = w - padL - padR, plotH = h - padT - padB;
  function xAt(i) { return padL + (i / (points.length - 1)) * plotW; }
  function yAt(v) { return padT + plotH - ((v - minVal) / range) * plotH; }
  const pathPts = points.map((p,i) => `${xAt(i).toFixed(1)},${yAt(p.netWorth).toFixed(1)}`).join(" ");
  const zeroY = yAt(0);
  const labels = points.map((p,i) => {
    if (points.length > 6 && i % 2 !== 0) return "";
    const [,m] = p.monthKey.split("-");
    return `<text x="${xAt(i).toFixed(1)}" y="${h-4}" fill="#8FA098" font-size="8" text-anchor="middle">${MONTH_NAMES[Number(m)-1].slice(0,3)}</text>`;
  }).join("");
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:150px;display:block;">
    <line x1="${padL}" y1="${zeroY.toFixed(1)}" x2="${w-padR}" y2="${zeroY.toFixed(1)}" stroke="rgba(237,234,224,0.15)" stroke-width="1"/>
    <polyline points="${pathPts}" fill="none" stroke="#C9A227" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${labels}
    <text x="${padL-6}" y="${padT+4}" fill="#8FA098" font-size="8" text-anchor="end">€${Math.round(maxVal)}</text>
  </svg>`;
}

// ===== Individualios veiklos mokesčių skaičiuoklė — izoliuota logika, saugu pašalinti kartu su UI dalimi renderRules() ir jos state.taxCalc/taxCalcResult laukais =====
function calculateIVTax(inputs) {
  const income = parseFloat(String(inputs.income).replace(",", ".")) || 0;
  const otherIncome = parseFloat(String(inputs.otherIncome).replace(",", ".")) || 0;
  const actualExpenses = parseFloat(String(inputs.actualExpenses).replace(",", ".")) || 0;
  const expenses = inputs.method === "actual" ? actualExpenses : income * 0.30;
  const AP = Math.max(0, income - expenses);

  let gpm;
  if (AP <= 20000) {
    gpm = AP * 0.05;
  } else if (AP <= 42500) {
    const pmk = AP * (0.15 - (2/300000) * (AP - 20000));
    gpm = Math.max(0, AP * 0.15 - pmk);
  } else {
    const T1 = 82962, T2 = 138270;
    const bracketTax = (v) => v <= T1 ? v*0.20 : v <= T2 ? T1*0.20 + (v-T1)*0.25 : T1*0.20 + (T2-T1)*0.25 + (v-T2)*0.32;
    gpm = Math.max(0, bracketTax(AP + otherIncome) - bracketTax(otherIncome));
  }

  const rawBase = AP * 0.90;
  const socialBase = inputs.insuredElsewhere ? rawBase : Math.max(rawBase, 13836);
  const vsd = inputs.firstYearRelief ? 0 : socialBase * 0.1252;
  const psd = inputs.insuredElsewhere ? 0 : Math.max(socialBase * 0.0698, 80.48 * 12);

  const total = gpm + vsd + psd;
  return { income, expenses, AP, gpm, vsd, psd, total, net: income - total };
}
function runTaxCalc() {
  state.taxCalc.income = document.getElementById("tax_income").value;
  if (state.taxCalc.method === "actual") state.taxCalc.actualExpenses = document.getElementById("tax_expenses").value;
  state.taxCalc.otherIncome = document.getElementById("tax_other").value;
  if (!parseFloat(String(state.taxCalc.income).replace(",","."))) { alert("Įvesk pajamų sumą."); return; }
  state.taxCalcResult = calculateIVTax(state.taxCalc);
  render();
}

function calcWhatIf(category, pctCut) {
  let monthsChecked = 0, total = 0;
  let key = currentMonthKey();
  for (let i = 0; i < 6 && monthsChecked < 3; i++) {
    const mk = shiftedMonthKey(key, -i);
    if (monthHasData(mk, "budget")) {
      const d = monthData(mk, "budget");
      if ((d.byCategory[category]||0) > 0) { total += d.byCategory[category]; monthsChecked++; }
    }
  }
  const avgMonthly = monthsChecked > 0 ? total / monthsChecked : 0;
  const monthlySavings = avgMonthly * (pctCut / 100);
  return { avgMonthly, monthlySavings, annualSavings: monthlySavings * 12, monthsChecked };
}
function runWhatIf() {
  const category = document.getElementById("whatif_category").value;
  const pct = parseFloat(document.getElementById("whatif_pct").value.replace(",", ".")) || 0;
  state.whatIfResult = { category, ...calcWhatIf(category, pct) };
  render();
}

function yearData(year) {
  let incomeTotal = 0, spentTotal = 0, investedTotal = 0;
  const monthly = [];
  const monthlyFull = [];
  for (let m = 1; m <= 12; m++) {
    const key = `${year}-${String(m).padStart(2,"0")}`;
    const d = monthData(key, "calendar");
    incomeTotal += d.incomeTotal; spentTotal += d.spentTotal; investedTotal += d.investedTotal;
    monthlyFull.push({ key, incomeTotal: d.incomeTotal, spentTotal: d.spentTotal, investedTotal: d.investedTotal });
    if (d.hasData) monthly.push({ key, incomeTotal: d.incomeTotal, spentTotal: d.spentTotal, investedTotal: d.investedTotal });
  }
  const saved = incomeTotal - spentTotal - investedTotal;
  return { incomeTotal, spentTotal, investedTotal, saved, monthly, monthlyFull };
}

function trendChartSVG(year) {
  const y = yearData(year);
  const series = [
    { key: "incomeTotal", color: "#6FBF73", label: "Pajamos" },
    { key: "spentTotal", color: "#D97742", label: "Išleista" },
    { key: "investedTotal", color: "#6FA3BF", label: "Investuota" },
  ];
  const values = y.monthlyFull.flatMap(m => series.map(s => m[s.key]));
  const maxVal = Math.max(1, ...values);
  const w = 320, h = 160, padL = 40, padR = 10, padT = 12, padB = 22;
  const plotW = w - padL - padR, plotH = h - padT - padB;
  const n = 12;
  function xAt(i) { return padL + (i / (n - 1)) * plotW; }
  function yAt(v) { return padT + plotH - (v / maxVal) * plotH; }
  const paths = series.map(s => {
    const pts = y.monthlyFull.map((m, i) => `${xAt(i).toFixed(1)},${yAt(m[s.key]).toFixed(1)}`).join(" ");
    return `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  }).join("");
  const gridLines = [0, 0.5, 1].map(f => {
    const yy = padT + plotH * (1 - f);
    return `<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${w-padR}" y2="${yy.toFixed(1)}" stroke="rgba(237,234,224,0.08)" stroke-width="1"/>`;
  }).join("");
  const labels = y.monthlyFull.map((m, i) => {
    if (i % 2 !== 0) return "";
    const name = MONTH_NAMES[Number(m.key.split("-")[1])-1].slice(0, 3);
    return `<text x="${xAt(i).toFixed(1)}" y="${h-4}" fill="#8FA098" font-size="8" text-anchor="middle">${name}</text>`;
  }).join("");
  const yLabelMax = `<text x="${padL-6}" y="${padT+4}" fill="#8FA098" font-size="8" text-anchor="end">€${Math.round(maxVal)}</text>`;
  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:180px;display:block;font-family:'IBM Plex Sans',sans-serif;">
      ${gridLines}${paths}${labels}${yLabelMax}
    </svg>
    <div class="legend" style="margin-top:4px;">
      ${series.map(s => `<span><span class="legend-dot" style="background:${s.color}"></span>${s.label}</span>`).join("")}
    </div>`;
}

function computeWrappedStats(year) {
  const y = yearData(year);
  const catTotals = {};
  let entriesCount = 0, overBudgetMonths = 0;
  y.monthly.forEach(m => {
    const d = monthData(m.key, "calendar");
    entriesCount += d.expenses.length + d.incomes.length;
    if (d.budgetTotal > 0 && d.spentTotal > d.budgetTotal) overBudgetMonths++;
    state.categories.filter(c => catType(c) === "expense").forEach(c => {
      catTotals[c] = (catTotals[c] || 0) + (d.byCategory[c] || 0);
    });
  });
  const catEntries = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);
  const biggestCategory = catEntries.length ? { name: catEntries[0][0], amount: catEntries[0][1] } : null;
  const monthsWithSpend = y.monthly.filter(m => m.spentTotal > 0);
  const bestMonth = monthsWithSpend.length ? [...monthsWithSpend].sort((a,b) => a.spentTotal-b.spentTotal)[0] : null;
  const worstMonth = monthsWithSpend.length ? [...monthsWithSpend].sort((a,b) => b.spentTotal-a.spentTotal)[0] : null;
  return { ...y, entriesCount, overBudgetMonths, biggestCategory, bestMonth, worstMonth };
}

}

function renderMonthlyReport() {
  const mode = budgetStartDay() > 1 ? state.reportDateMode : "calendar";
  const monthKey = state.reportCursor;
  const d = monthData(monthKey, mode);
  const canGoForward = monthKey < currentMonthKey();
  const dateModeToggle = budgetStartDay() > 1 ? `
    <div class="toggle-row" style="margin-bottom:14px;">
      <button type="button" class="toggle-btn ${mode!=='calendar'?'active blue':''}" onclick="state.reportDateMode='budget';state.reportCursor=currentMonthKey();render();">Mano mėnuo</button>
      <button type="button" class="toggle-btn ${mode==='calendar'?'active blue':''}" onclick="state.reportDateMode='calendar';state.reportCursor=new Date().toISOString().slice(0,7);render();">Kalendorinis</button>
    </div>` : "";

  if (!d.hasData) {
    return `${dateModeToggle}
      <div class="report-month-nav">
        <button class="nav-btn" onclick="shiftReportMonth(-1)" aria-label="Ankstesnis mėnesis">${ICONS.chevronLeft}</button>
        <div class="display" style="font-size:17px;font-weight:600;">${periodLabel(monthKey, mode)}</div>
        <button class="nav-btn" style="${canGoForward?'':'opacity:.3;'}" ${canGoForward?'':'disabled'} onclick="shiftReportMonth(1)" aria-label="Kitas mėnesis">${ICONS.chevronRight}</button>
      </div>
      <div class="empty" style="text-align:center;padding:40px 0;">Šiam mėnesiui duomenų nėra.</div>`;
  }

  const sorted = [...state.categories].filter(c=>catType(c)==="expense").sort((a,b) => (d.byCategory[b]||0)-(d.byCategory[a]||0));
  const top3 = sorted.filter(c => d.byCategory[c] > 0).slice(0,3);
  const remaining = d.incomeTotal > 0 ? d.incomeTotal - d.spentTotal - d.investedTotal : d.budgetTotal - d.spentTotal;
  const remainingLabel = d.incomeTotal > 0 ? "Likutis po išlaidų ir investicijų" : (remaining>=0 ? "Likutis" : "Viršyta");
  const necessaryPct = d.spentTotal > 0 ? 100 - (d.unnecessarySpent/d.spentTotal)*100 : 100;
  const tips = buildTips(monthKey, mode);
  const colorFor = t => t === "warn" ? "var(--rust)" : t === "ok" ? "var(--green)" : "var(--faint)";

  const prevKey = shiftedMonthKey(monthKey, -1);
  const prevD = monthHasData(prevKey, mode) ? monthData(prevKey, mode) : null;
  const pctChange = (now, prev) => prev > 0 ? ((now-prev)/prev)*100 : (now > 0 ? 100 : 0);
  const comparisonSection = prevD ? (() => {
    const totalChange = pctChange(d.spentTotal, prevD.spentTotal);
    const catChanges = state.categories
      .filter(c => catType(c) === "expense")
      .map(c => ({ c, now: d.byCategory[c]||0, prev: prevD.byCategory[c]||0, diff: (d.byCategory[c]||0) - (prevD.byCategory[c]||0) }))
      .filter(x => x.now > 0 || x.prev > 0)
      .sort((a,b) => Math.abs(b.diff) - Math.abs(a.diff))
      .slice(0, 5);
    return `
    <div class="section-label" style="margin-top:18px;">Palyginimas su praėjusiu mėnesiu</div>
    <div class="tip-card" style="border-left-color:${totalChange>0?'var(--rust)':'var(--green)'};">
      <div style="font-size:13px;">Iš viso išleista: <span class="tape" style="color:${totalChange>0?'var(--rust)':'var(--green)'}">${totalChange>=0?'+':''}${fmt(totalChange)}%</span> ${totalChange>=0?'daugiau':'mažiau'} nei ${periodLabel(prevKey, mode)}</div>
    </div>
    ${catChanges.map(x => `<div class="ledger-row" style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;">
      <span>${catEmoji(x.c)}${escapeHtml(x.c)}</span>
      <span class="tape" style="color:${x.diff>0?'var(--rust)':x.diff<0?'var(--green)':'var(--faint)'}">${x.diff>=0?'+':''}€${fmt(x.diff)}</span>
    </div>`).join("")}
    `;
  })() : "";

  return `${dateModeToggle}
    <div class="report-month-nav">
      <button class="nav-btn" onclick="shiftReportMonth(-1)" aria-label="Ankstesnis mėnesis">${ICONS.chevronLeft}</button>
      <div class="display" style="font-size:17px;font-weight:600;">${periodLabel(monthKey, mode)}</div>
      <button class="nav-btn" style="${canGoForward?'':'opacity:.3;'}" ${canGoForward?'':'disabled'} onclick="shiftReportMonth(1)" aria-label="Kitas mėnesis">${ICONS.chevronRight}</button>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Pajamos</div><div class="tape stat-value" style="color:var(--green)">€${fmt(d.incomeTotal)}</div></div>
      <div class="stat-card"><div class="stat-label">Išleista</div><div class="tape stat-value">€${fmt(d.spentTotal)}</div></div>
      <div class="stat-card"><div class="stat-label">Investuota</div><div class="tape stat-value" style="color:var(--blue)">€${fmt(d.investedTotal)}</div></div>
      <div class="stat-card"><div class="stat-label">${remainingLabel}</div><div class="tape stat-value" style="color:${remaining>=0?'var(--green)':'var(--rust)'}">€${fmt(Math.abs(remaining))}</div></div>
      <div class="stat-card"><div class="stat-label">Nereikalinga</div><div class="tape stat-value" style="color:${d.unnecessarySpent>0?'var(--rust)':'var(--faint)'}">€${fmt(d.unnecessarySpent)}</div></div>
      <div class="stat-card"><div class="stat-label">Būtinos išlaidos</div><div class="tape stat-value">${Math.round(necessaryPct)}%</div></div>
    </div>
    ${comparisonSection}

    <div class="section-label" style="margin-top:18px;">Patarimai</div>
    ${tips.map(t => `<div class="tip-card" style="border-left-color:${colorFor(t.tone)}"><div style="display:flex;gap:8px;align-items:flex-start;color:${colorFor(t.tone)}">${ICONS.bulb}<span style="color:var(--paper)">${t.text}</span></div></div>`).join("")}

    <div class="section-label" style="margin-top:18px;">Pagal kategoriją</div>
    ${state.categories.map(c => catRow(c, monthKey, d, mode)).join("")}

    <div class="section-label" style="margin-top:18px;">Daugiausiai leista</div>
    ${top3.length ? top3.map((c,i)=>`<div class="ledger-row" style="display:flex;justify-content:space-between;padding:8px 0;font-size:14px;"><span>${i+1}. ${c}</span><span class="tape">€${fmt(d.byCategory[c])}</span></div>`).join("") : `<div class="empty">Nėra duomenų šiam mėnesiui.</div>`}`;
}

          <button class="icon-btn" style="color:var(--gold)" onclick="confirmEditRecurringIncome('${t.id}')">${ICONS.check}</button>

        </div>

    return `
    <div class="ledger-row" style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px;">
      <span style="color:var(--green);">↑ ${escapeHtml(t.label)}</span>
      <span style="display:flex;align-items:center;gap:8px;">
        <span class="tape">€${fmt(t.amount)}/mėn.</span>
        <button class="icon-btn" onclick="state.editingRecurringIncomeId='${t.id}';render();" aria-label="Redaguoti">${ICONS.pencil}</button>
        <button class="icon-btn" style="color:var(--rust);" onclick="deleteRecurringIncome('${t.id}')" aria-label="Ištrinti pasikartojančią pajamą">${ICONS.trash}</button>
      </span>
    </div>`;
  }).join("");

  const holdingRows = state.holdings.map(h => {
    if (state.editingHoldingId === h.id) {
      return `<div class="ledger-row" style="padding:10px 0;">
        <div style="font-size:13px;font-weight:600;margin-bottom:6px;">${escapeHtml(h.ticker)}</div>
        <div style="display:flex;gap:6px;margin-bottom:6px;">

    </div>`;
  }).join("");

  const cryptoRows = state.cryptoHoldings.map(h => {
    if (state.editingCryptoId === h.id) {
      return `<div class="ledger-row" style="padding:10px 0;">
        <div style="font-size:13px;font-weight:600;margin-bottom:6px;">${escapeHtml(h.coinId)}</div>

      ${h.priceError ? `<div style="font-size:11px;color:var(--rust);margin-top:3px;">${escapeHtml(h.priceError)}</div>` : ""}
      ${h.lastPriceAt ? `<div style="font-size:10px;color:var(--faint);margin-top:2px;">Kaina atnaujinta: ${new Date(h.lastPriceAt).toLocaleString('lt-LT')}</div>` : ""}

    ? `<div style="font-size:12px;color:var(--gold);margin-top:8px;">Dar niekada nedarei atsarginės kopijos — rekomenduojame tai padaryti dabar.</div>`

      <label class="submit-btn" style="background:var(--surface-light);color:var(--paper);text-align:center;">
        Importuoti<input type="file" accept="application/json" style="display:none;" onchange="importDataFile(this)" />
      </label>
    </div>
    ${exportReminder}
    <button type="button" class="submit-btn" style="background:var(--surface-light);color:var(--paper);margin-top:8px;" onclick="exportCSV()">Eksportuoti CSV (Excel/Sheets)</button>

    ${settingsSectionHeader('budgetday', 'Mano biudžeto mėnuo', `Prasideda ${state.budgetStartDay || 1} d.`)}

    <div class="field-row">

    </div>

    ${settingsSectionHeader('savingscfg', 'Santaupos', `€${fmt(state.savingsBalance)}`)}
    <div class="settings-collapse ${state.settingsExpanded['savingscfg']?'expanded':''}">
    <div class="field-row">
      <span class="field-row-label">Dabartinė santaupų suma</span>
      <div class="field-row-input"><span style="color:var(--faint)">€</span><input type="text" inputmode="decimal" value="${state.savingsBalance}" onchange="updateSavingsBalance(this.value)" /></div>
    </div>
    <div class="field-row-hint">Nustatyk savo tikrą santaupų sumą. Ji automatiškai sumažės, kai pažymėsi išlaidą kaip „apmokėta iš santaupų” (pvz. kelionėje) — tokios išlaidos neįskaičiuojamos į mėnesio biudžetą.</div>

    <div class="field-row">
      <span class="field-row-label">Minimali riba (įspėjimas)</span>

    </div>
    <div class="field-row-hint">Jei santaupos nukris žemiau šios sumos, Apžvalgoje matysi įspėjimą. 0 = išjungta.</div>

    ${state.savingsLog.length ? `
      <div style="font-size:12px;color:var(--faint);margin-bottom:4px;">Paskutiniai koregavimai:</div>
      ${state.savingsLog.slice(0,5).map(l => `<div style="font-size:11px;color:var(--faint);padding:2px 0;">${l.date.split("-").reverse().join(".")}: €${fmt(l.from)} → €${fmt(l.to)}</div>`).join("")}
    ` : ""}

    ${(() => {
      const groups = {};
      state.expenses.filter(e => e.fromSavings && e.event).forEach(e => {
        const key = e.event.trim();
        groups[key] = (groups[key] || 0) + Number(e.amount);
      });
      const keys = Object.keys(groups);
      if (keys.length === 0) return "";
      return `<div class="section-label" style="margin-top:16px;">Kelionių / įvykių išlaidos (iš santaupų)</div>
        ${keys.map(k => `<div class="ledger-row" style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;"><span>${escapeHtml(k)}</span><span class="tape">€${fmt(groups[k])}</span></div>`).join("")}`;
    })()}

    ${(() => {
      const goalCats = state.categories.filter(c => catType(c) === "savingsgoal");
      if (goalCats.length === 0) return "";
      const perGoal = goalCats.map(c => ({ c, net: netSavingsGoalAmount(c) }));
      const allocated = perGoal.reduce((s,g) => s + g.net, 0);
      const unallocated = Math.max(0, state.savingsBalance - allocated);
      return `<div class="section-label" style="margin-top:16px;">Kaip išskaidyta santaupų suma</div>
        <div style="font-size:11px;color:var(--faint);margin-bottom:8px;">Jei visas santaupas laikai vienoje sąskaitoje, čia matai, kiek iš tos sumos „priklauso" kiekvienam tikslui.</div>
